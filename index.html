<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriRecipes</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1D9E75">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script async src="https://www.instagram.com/embed.js"></script>
<style>
  :root{
    --bg: #F7F7F5;
    --accent: #1D9E75;
    --accent-dark: #167A5B;
    --card: #FFFFFF;
    --border: #EAEAE6;
    --ink: #222222;
    --ink-soft: #8A8A85;
    --protein-bg: #E8F0FE; --protein-fg: #2B5FBF;
    --carb-bg: #FCEFE0; --carb-fg: #B5690E;
    --fat-bg: #FBEAEA; --fat-fg: #B23A3A;
    --dot-protein: #1D9E75;
    --dot-carbs: #C9821D;
    --dot-fat: #8B5CF6;
    --meal-breakfast: #C9821D;
    --meal-lunch: #1D9E75;
    --meal-dinner: #8B5CF6;
    --meal-snack: #2B7FD6;
    --tint-1: #D9EEE4; --tint-1-line: #C3E2D5;
    --tint-2: #E9E1F5; --tint-2-line: #DACDEE;
    --tint-3: #F3E7D3; --tint-3-line: #E8D5B4;
    --radius: 16px;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  a{ color: inherit; }
  button{ font-family: inherit; }

  /* ===== Loading screen ===== */
  #loadingScreen{
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100;
    gap: 14px;
  }
  .spinner{
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  #loadingScreen .msg{ color: var(--ink-soft); font-size: 14px; }

  /* ===== Header ===== */
  .header{
    max-width: 1180px;
    margin: 0 auto;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .brand{
    font-size: 18px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark{
    width: 30px; height: 30px;
    border-radius: 9px;
    background: var(--accent);
  }
  .tab-nav{ display: flex; align-items: center; gap: 28px; }
  .tab-link{
    background: none; border: none; cursor: pointer; font-family: inherit;
    font-size: 15px; font-weight: 600; color: var(--ink-soft);
    padding: 6px 0; border-bottom: 2px solid transparent;
  }
  .tab-link.active{ color: var(--ink); border-bottom-color: var(--accent); }
  .search-box{
    position: relative;
    max-width: 420px;
  }
  .search-box input{
    width: 100%;
    padding: 11px 16px 11px 38px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--card);
    font-size: 14px;
    outline: none;
  }
  .search-box input:focus{ border-color: var(--accent); }
  .search-box .icon{
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--ink-soft); font-size: 14px; pointer-events:none;
  }
  .icon-btn{
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    display: flex; align-items:center; justify-content:center;
    cursor: pointer;
    font-size: 16px;
    color: var(--ink-soft);
    flex-shrink: 0;
  }
  .icon-btn:hover{ border-color: var(--accent); color: var(--accent); }
  .account-btn{
    background: var(--bg); border: 1px solid var(--border); border-radius: 999px;
    padding: 9px 18px; font-weight: 600; font-size: 13.5px; color: var(--ink); cursor: pointer;
  }
  .account-btn:hover{ border-color: var(--accent); color: var(--accent-dark); }
  .account-btn.logged-in{ background: #E4EEE7; border-color: var(--accent); color: var(--accent-dark); }
  .status{ font-size: 13px; color: var(--ink-soft); margin: 4px 0 10px; }
  .status.error{ color: #B23A3A; }
  .plan-generator-box{
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px 22px; margin-bottom: 20px;
  }
  .plan-generator-box .row{ display: flex; gap: 10px; }
  .plan-generator-box input[type=text]{
    flex: 1; padding: 10px 14px; border-radius: 9px; border: 1px solid var(--border); font-size: 14px;
  }
  .plan-generator-box input[type=text]:focus{ outline: 2px solid var(--accent); border-color: var(--accent); }
  .plan-preview-meal{ margin-top: 14px; }
  .plan-preview-meal-title{ font-size: 12.5px; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  .plan-preview-row{ display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .plan-preview-row:last-child{ border-bottom: none; }

  /* ===== Data source banners ===== */
  .data-banner{
    max-width: 1180px;
    margin: 16px auto 0;
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 13.5px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .data-banner.warn{ background: #FFF6E5; color: #8A5A00; border: 1px solid #F0DBA0; }
  .data-banner.error{ background: #FBEAEA; color: #B23A3A; border: 1px solid #F0BABA; }
  .data-banner button{
    border: 1px solid currentColor;
    background: none;
    color: inherit;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
  }

  /* ===== Content wrap (used by detail + diary pages) ===== */
  .content{
    max-width: 1180px;
    margin: 0 auto;
    padding: 28px 24px 120px;
  }
  .result-count{
    font-size: 14px;
    color: var(--ink-soft);
    margin: 4px 0 16px;
  }
  .result-count b{ color: var(--ink); }

  /* ===== Browse layout ===== */
  .browse-layout{
    max-width: 1360px;
    margin: 0 auto;
    padding: 28px 24px 120px;
    display: grid;
    grid-template-columns: 220px 1fr 240px;
    gap: 32px;
    align-items: start;
  }
  .filters-sidebar{ position: sticky; top: 24px; }
  .filters-sidebar h2{ font-size: 20px; margin: 0 0 18px; }
  .plan-sidebar{ position: sticky; top: 24px; }
  .plan-sidebar-card{
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px;
  }
  .plan-sidebar-head{ display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .plan-sidebar-close{
    border: none; background: none; color: var(--ink-soft); cursor: pointer; font-size: 13px; padding: 2px 4px;
  }
  .plan-sidebar-close:hover{ color: #B23A3A; }
  .plan-sidebar-collapsed-btn{
    width: 100%;
    display: flex; align-items: center; gap: 8px;
    background: var(--card); border: 1px solid var(--border); border-radius: 999px;
    padding: 10px 14px; cursor: pointer; text-align: left;
  }
  .plan-sidebar-collapsed-btn:hover{ border-color: var(--accent); }
  .ps-collapsed-label{ font-size: 12.5px; font-weight: 600; flex: 1; }
  .ps-collapsed-kcal{ font-size: 12px; color: var(--ink-soft); white-space: nowrap; }
  .ps-collapsed-chevron{ color: var(--ink-soft); font-size: 12px; }
  .plan-sidebar-title{ font-size: 14px; font-weight: 700; }
  .plan-sidebar-date{
    width: 100%; padding: 8px 10px; border-radius: 9px; border: 1px solid var(--border);
    font-size: 12.5px; margin-bottom: 14px;
  }
  .plan-sidebar-kcal{ display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
  .plan-sidebar-kcal .num{ font-size: 24px; font-weight: 800; }
  .plan-sidebar-kcal .lbl{ font-size: 11.5px; color: var(--ink-soft); }
  .plan-sidebar-macros{ display: flex; gap: 10px; font-size: 11.5px; color: var(--ink-soft); margin-bottom: 14px; }
  .plan-sidebar-list{ border-top: 1px solid var(--border); padding-top: 10px; }
  .plan-sidebar-row{ display: flex; justify-content: space-between; font-size: 12.5px; padding: 6px 0; gap: 8px; }
  .plan-sidebar-row span:first-child{ overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .plan-sidebar-row span:last-child{ color: var(--ink-soft); flex-shrink: 0; }
  .plan-sidebar-empty{ font-size: 12px; color: var(--ink-soft); margin: 0; }
  .filter-group{ margin-bottom: 26px; }
  .filter-group-title{
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 12px;
  }
  .filter-check-row{
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    cursor: pointer;
    font-size: 14.5px;
  }
  .filter-check-row input[type=checkbox]{
    width: 16px; height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .filter-check-row .fc-label{ flex: 1; }
  .filter-check-row .fc-count{ color: var(--ink-soft); font-size: 13px; }

  .browse-main-head{ margin-bottom: 20px; }
  .browse-main-head h1{ font-size: 34px; margin: 0 0 6px; }
  .browse-main-head p{ color: var(--ink-soft); font-size: 15px; margin: 0 0 20px; }
  .browse-search-row{ display: flex; align-items: center; gap: 16px; }
  .browse-search-row .search-box{ flex: 1; }
  .browse-search-row .result-count-inline{ font-size: 14.5px; color: var(--ink-soft); white-space: nowrap; }
  .browse-search-row .result-count-inline b{ color: var(--ink); }

  /* ===== Recipe cards (redesign) ===== */
  .recipe-grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
    margin-top: 22px;
  }
  .recipe-card{
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow 0.15s ease, transform 0.15s ease;
  }
  .recipe-card:hover{ box-shadow: 0 10px 24px -14px rgba(0,0,0,0.25); transform: translateY(-2px); }
  .recipe-photo{
    height: 150px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .recipe-photo img{ width: 100%; height: 100%; object-fit: cover; }
  .fav-heart-btn{
    position: absolute; top: 10px; right: 10px;
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,0.9); border: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; color: #8A8A85; cursor: pointer;
    z-index: 2;
  }
  .fav-heart-btn.active{ color: #B23A3A; }
  .fav-heart-btn:hover{ transform: scale(1.08); }
  .recipe-photo.placeholder{
    background-image: repeating-linear-gradient(45deg, var(--tint-line) 0, var(--tint-line) 2px, var(--tint) 2px, var(--tint) 14px);
  }
  .recipe-photo.tint-1{ --tint: var(--tint-1); --tint-line: var(--tint-1-line); }
  .recipe-photo.tint-2{ --tint: var(--tint-2); --tint-line: var(--tint-2-line); }
  .recipe-photo.tint-3{ --tint: var(--tint-3); --tint-line: var(--tint-3-line); }
  .recipe-photo span{
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: rgba(0,0,0,0.35);
  }
  .recipe-card-body{ padding: 16px 18px 18px; }
  .recipe-tags{ display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .recipe-tag{
    background: var(--bg); border: 1px solid var(--border);
    font-size: 11.5px; font-weight: 600; padding: 4px 10px; border-radius: 999px; color: var(--ink-soft);
  }
  .recipe-title{ font-size: 16.5px; font-weight: 700; margin: 0 0 10px; line-height: 1.3; }
  .recipe-kcal{ font-size: 14px; color: var(--ink-soft); margin-bottom: 10px; }
  .recipe-kcal b{ font-size: 22px; color: var(--ink); font-weight: 800; }
  .recipe-macro-dots{ display: flex; gap: 14px; font-size: 13px; color: var(--ink-soft); margin-bottom: 12px; }
  .recipe-macro-dots span{ display: flex; align-items: center; gap: 5px; }
  .macro-dot{ width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .macro-dot.p{ background: var(--dot-protein); }
  .macro-dot.c{ background: var(--dot-carbs); }
  .macro-dot.f{ background: var(--dot-fat); }
  .add-to-chart-btn{
    width: 100%;
    padding: 8px 0;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--accent-dark);
    font-weight: 600;
    font-size: 12.5px;
    cursor: pointer;
  }
  .add-to-chart-btn:hover{ background: #E4EEE7; border-color: var(--accent); }

  @media (max-width: 1050px){
    .browse-layout{ grid-template-columns: 220px 1fr; }
    .plan-sidebar{ grid-column: 1 / -1; position: static; }
    .plan-sidebar-card{ max-width: 320px; }
  }
  @media (max-width: 820px){
    .browse-layout{ grid-template-columns: 1fr; }
    .filters-sidebar{ position: static; }
    .plan-sidebar-card{ max-width: none; }
  }
  .card{
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 18px 20px;
    text-align: center;
    cursor: pointer;
    transition: box-shadow 0.15s ease, transform 0.15s ease;
  }
  .card:hover{
    box-shadow: 0 10px 24px -14px rgba(0,0,0,0.25);
    transform: translateY(-2px);
  }
  .card-icon{
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--bg);
    font-size: 30px;
    display: flex; align-items:center; justify-content:center;
    margin: 0 auto 12px;
    overflow: hidden;
  }
  .card-thumb-img{
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .card-title{
    font-size: 16px;
    font-weight: 700;
    margin: 0 0 10px;
    line-height: 1.3;
  }
  .cal-pill{
    display: inline-block;
    background: #FCEFE0;
    color: #B5690E;
    font-size: 12.5px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 999px;
    margin-bottom: 10px;
  }
  .macro-badges{
    display: flex;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .badge{
    font-size: 11.5px;
    font-weight: 700;
    padding: 4px 9px;
    border-radius: 999px;
  }
  .badge.p{ background: var(--protein-bg); color: var(--protein-fg); }
  .badge.c{ background: var(--carb-bg); color: var(--carb-fg); }
  .badge.f{ background: var(--fat-bg); color: var(--fat-fg); }

  .empty-state{
    grid-column: 1 / -1;
    text-align: center;
    padding: 70px 20px;
    color: var(--ink-soft);
  }
  .empty-state h3{ color: var(--ink); font-size: 19px; margin: 0 0 6px; }
  .empty-state button{
    margin-top: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 999px;
    font-weight: 600;
    cursor: pointer;
  }

  .add-to-chart-btn{
    width: 100%;
    margin-top: 12px;
    padding: 8px 0;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--accent-dark);
    font-weight: 600;
    font-size: 12.5px;
    cursor: pointer;
  }
  .add-to-chart-btn:hover{ background: #E4EEE7; border-color: var(--accent); }

  .meal-choice-row{ display: flex; gap: 8px; flex-wrap: wrap; }
  .meal-choice-btn{
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--ink);
  }
  .meal-choice-btn.active{ background: var(--accent); border-color: var(--accent); color: #fff; }

  .icon-x{
    border: none; background: none; color: var(--ink-soft); cursor: pointer;
    font-size: 13px; padding: 2px 4px; margin-left: 6px;
  }
  .icon-x:hover{ color: #B23A3A; }

  /* ===== FAB ===== */
  .fab{
    position: fixed;
    right: 28px; bottom: 28px;
    width: 58px; height: 58px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none;
    font-size: 28px;
    line-height: 1;
    box-shadow: 0 8px 20px -6px rgba(29,158,117,0.6);
    cursor: pointer;
    z-index: 40;
  }
  .fab:hover{ background: var(--accent-dark); }

  /* ===== Detail view ===== */
  .back-btn{
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    padding: 8px 0 18px;
  }
  .back-btn:hover{ color: var(--accent); }
  .detail-hero{
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 34px 24px;
    text-align: center;
    margin-bottom: 20px;
  }
  .detail-hero .card-icon{ width: 84px; height: 84px; font-size: 40px; }
  .detail-hero h1{ font-size: 24px; margin: 4px 0 14px; }
  .detail-hero .cal-pill{ font-size: 14px; padding: 7px 16px; }
  .detail-hero .macro-badges{ margin-top: 12px; }
  .detail-hero .badge{ font-size: 13px; padding: 6px 12px; }

  .section-block{
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 20px;
  }
  .section-block h2{
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    margin: 0 0 14px;
  }

  /* ===== Diary view ===== */
  .date-strip-row{ display: flex; align-items: center; gap: 8px; margin-bottom: 18px; }
  .date-strip{ display: flex; gap: 8px; flex: 1; overflow-x: auto; }
  .date-box{
    flex: 1; min-width: 52px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 4px; text-align: center; cursor: pointer;
    display: flex; flex-direction: column; gap: 2px;
  }
  .date-box .db-day{ font-size: 10.5px; font-weight: 700; letter-spacing: 0.04em; color: var(--ink-soft); }
  .date-box .db-num{ font-size: 15px; font-weight: 700; color: var(--ink); }
  .date-box.active{ background: var(--accent); border-color: var(--accent); }
  .date-box.active .db-day, .date-box.active .db-num{ color: #fff; }

  .diary-eyebrow{ font-size: 11.5px; font-weight: 700; letter-spacing: 0.08em; color: var(--ink-soft); text-transform: uppercase; }
  .diary-date-heading{ font-size: 28px; margin: 2px 0 20px; }

  .macro-summary-card{
    position: relative;
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 24px; margin-bottom: 24px; display: flex; align-items: flex-start; gap: 40px; flex-wrap: wrap;
  }
  .edit-goals-btn{
    position: absolute; top: 20px; right: 20px;
    display: flex; align-items: center; gap: 6px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 999px;
    padding: 8px 16px; font-weight: 600; font-size: 13px; color: var(--ink); cursor: pointer;
  }
  .edit-goals-btn:hover{ border-color: var(--accent); color: var(--accent-dark); background: #E4EEE7; }
  .kcal-remaining-block{ min-width: 220px; }
  .kcal-remaining-num{ font-size: 40px; font-weight: 800; line-height: 1; }
  .kcal-remaining-num.over{ color: #B23A3A; }
  .kcal-remaining-label{ font-size: 11.5px; font-weight: 700; letter-spacing: 0.06em; color: var(--ink-soft); margin: 4px 0 6px; }
  .kcal-remaining-label.over{ color: #B23A3A; }
  .kcal-remaining-sub{ font-size: 13px; color: var(--ink-soft); margin-bottom: 12px; }
  .meal-stack-track{ display: flex; height: 8px; border-radius: 999px; background: var(--bg); overflow: hidden; margin-bottom: 14px; }
  .meal-stack-track.over{ box-shadow: 0 0 0 2px #FBEAEA; }
  .meal-stack-fill{ height: 100%; }
  .meal-legend-row{ display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 3px 0; }
  .meal-legend-row span:nth-child(2){ flex: 1; color: var(--ink); }
  .meal-legend-kcal{ color: var(--ink-soft); }
  .meal-dot{ width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .macro-bars{ flex: 1; min-width: 220px; padding-top: 40px; }
  .macro-bar-row{ margin-bottom: 14px; }
  .macro-bar-row:last-of-type{ margin-bottom: 0; }

function parseIngredientLine(line){
  const tokens = line.trim().split(/\s+/);
  if(tokens.length < 2) return null;
  const qty = parseFloat(tokens[0]);
  if(isNaN(qty)) return null;
  let name, unit;
  if(UNITS.includes(tokens[1].toLowerCase())){
    unit = tokens[1].toLowerCase();
    name = tokens.slice(2).join(" ");
  } else {
    unit = "pc";
    name = tokens.slice(1).join(" ");
  }
  return { qty, name: name.trim().toLowerCase(), raw: line.trim(), unit };
}

function findFood(name){
  if(ALIASES[name]){
    const f = foodDB.find(f => f.food_item === ALIASES[name]);
    if(f) return f;
  }
  let exact = foodDB.find(f => f.food_item === name);
  if(exact) return exact;
  // Combined-option names like "rice/wheat flour/quinoa/semiya" — match if the
  // ingredient name equals the FIRST listed option. This is checked before the
  // loose substring fallback so it can't be shadowed by an unrelated item
  // (e.g. "rice flour") that also happens to contain the same substring.
  let firstOptionMatch = foodDB.find(f => f.food_item.split("/")[0].trim() === name);
  if(firstOptionMatch) return firstOptionMatch;
  let partial = foodDB.find(f => f.food_item.includes(name) || name.includes(f.food_item));
  if(partial) return partial;
  return null;
}

    const qty = (ov.qty !== undefined && ov.qty !== null && ov.qty !== "") ? Number(ov.qty) : parsed.qty;
    const name = ov.name || parsed.name;
    const food = findFood(name);
    if(!food){ details.push({ ...parsed, qty, name, matched: false, idx }); return; }
    const scale = qty / food.quantity;
    const m = { calories: food.calories*scale, fat: food.fat*scale, carbs: food.carbs*scale, protein: food.protein*scale };
    totals.calories += m.calories; totals.fat += m.fat; totals.carbs += m.carbs; totals.protein += m.protein;
    details.push({ ...parsed, qty, name, matched: true, macros: m, dbItem: food.food_item, idx });
  });
  return { totals, details };
}

function r(n){ return Math.round(n); }
function macroCalories(protein, carbs, fat){ return (protein||0)*4 + (carbs||0)*4 + (fat||0)*9; }

async function loadFromSupabase(){
  const [{ data: recipeRows, error: recipeErr }, { data: foodRows, error: foodErr }] = await Promise.all([
    supabaseClient.from("recipes").select("*").order("id", { ascending: true }),
    supabaseClient.from("food_items").select("*").order("id", { ascending: true })
  ]);
  if(recipeErr) throw recipeErr;
  if(foodErr) throw foodErr;

  const parsedRecipes = (recipeRows || []).map(row => ({
    id: row.id, name: row.name || "Untitled", icon: row.icon || "🍽️",
    description: row.description || "", ingredients: row.ingredients || "",
    steps: row.steps || "", video_url: row.video_url || "", thumbnail_url: row.thumbnail_url || ""
  }));
  const parsedFood = (foodRows || []).map(row => ({
    food_item: String(row.food_item).trim().toLowerCase(),
    quantity: Number(row.quantity) || 1, fat: Number(row.fat) || 0,
    carbs: Number(row.carbs) || 0, protein: Number(row.protein) || 0, calories: Number(row.calories) || 0
  }));
  return { recipes: parsedRecipes, foodDB: parsedFood };
}

/* ============ FILTER HELPERS ============ */
const CAL_BUCKETS = [
  { key: "under300", label: "Under 300 kcal", test: c => c < 300 },
  { key: "300to500", label: "300–500 kcal", test: c => c >= 300 && c < 500 },
  { key: "500to750", label: "500–750 kcal", test: c => c >= 500 && c < 750 },
  { key: "750plus", label: "750+ kcal", test: c => c >= 750 }
];
const NON_VEG_KEYWORDS = ["chicken", "egg", "fish", "turkey", "shrimp"];

function recipeIngredientLabels(rc){
  const labels = new Set();
  (rc.ingredients || "").split("|").map(s => s.trim()).filter(Boolean).forEach(line => {
    const parsed = parseIngredientLine(line);
    if(!parsed) return;
    const food = findFood(parsed.name);
    const label = food ? food.food_item : parsed.name;
    const shortLabel = label.split("/")[0].split("(")[0].trim();
    if(shortLabel) labels.add(shortLabel);
  });
  return labels;
}

// Diet-type tags are derived heuristically from ingredients/macros — there's no
// separately curated "diet type" field in the data, so treat these as estimates.
function recipeDietTags(rc, totals){
  const labels = [...recipeIngredientLabels(rc)];
  const isVeg = !labels.some(l => NON_VEG_KEYWORDS.some(k => l.includes(k)));
  const proteinRatio = totals.calories > 0 ? (totals.protein * 4) / totals.calories : 0;
  const carbRatio = totals.calories > 0 ? (totals.carbs * 4) / totals.calories : 0;
  const fatRatio = totals.calories > 0 ? (totals.fat * 9) / totals.calories : 0;
  const tags = [];
  if(isVeg) tags.push("Vegetarian");
  if(proteinRatio >= 0.28) tags.push("High Protein");
  if(totals.carbs <= 30) tags.push("Low Carb");
  if(fatRatio >= 0.55 && carbRatio <= 0.12) tags.push("Keto-Friendly");
  return tags;
}

function matchesSearch(rc, term){
  if(!term) return true;
  const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const re = new RegExp("\\b" + escaped, "i");
  if(re.test(rc.name)) return true;
  return [...recipeIngredientLabels(rc)].some(label => re.test(label));
}

function passesFilters(rc){
  const totals = calcMacros(rc.ingredients).totals;
  const bucketOk = state.calBuckets.size === 0 || [...state.calBuckets].some(key => CAL_BUCKETS.find(b => b.key === key).test(totals.calories));
  const dietTags = recipeDietTags(rc, totals);
  const dietOk = state.dietTags.size === 0 || [...state.dietTags].some(t => dietTags.includes(t));
  const searchOk = matchesSearch(rc, state.search);
  const favOk = !state.favoritesOnly || userFavorites.has(rc.id);
  return bucketOk && dietOk && searchOk && favOk;
}

  state.favoritesOnly = !state.favoritesOnly;
  render();
}

  if(!url) return null;
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{6,})/);
  return m ? m[1] : null;
}

/* ============ NATURAL LANGUAGE DIET PLAN GENERATOR ============
   Pattern-matches common phrasings (calories, diet type, date) rather than
   using a real AI call — no backend infra needed for this version. Genuinely
   open-ended phrasing beyond these patterns won't parse; that's the honest
   limit of this approach versus a true LLM-backed parser. */
let pendingPlan = null;

function parsePlanQuery(text){
  const lower = text.toLowerCase();

  // Local guardrail (used when the AI parser isn't deployed or fails): if the text has
  // no calorie number, no diet-type keyword, and no food/meal-related word at all,
  // treat it as out of scope rather than silently generating a generic default plan.
  const hasCalories = /\d{3,5}\s*(kcal|cal|calorie|calories)/.test(lower);
  const hasDietKeyword = /(low[\s-]?carb|high[\s-]?protein|keto|vegetarian)/.test(lower);
  const hasMealKeyword = /(diet|meal|breakfast|lunch|dinner|snack|calorie|cal|nutrition|recipe|food|eat)/.test(lower);
  if(!hasCalories && !hasDietKeyword && !hasMealKeyword){
    return { outOfScope: true };
  }

  const calMatch = lower.match(/(\d{3,5})\s*(kcal|cal|calorie|calories)/);
  const calories = calMatch ? parseInt(calMatch[1], 10) : dailyGoals.calories;

  let dietTag = null;
  if(/low[\s-]?carb/.test(lower)) dietTag = "Low Carb";
  else if(/high[\s-]?protein/.test(lower)) dietTag = "High Protein";
  else if(/keto/.test(lower)) dietTag = "Keto-Friendly";
  else if(/vegetarian/.test(lower)) dietTag = "Vegetarian";

  let dateStr = todayStr();
  if(/tomorrow/.test(lower)){
    const d = new Date(); d.setDate(d.getDate() + 1);
    dateStr = d.toISOString().slice(0,10);
  } else if(/day after tomorrow/.test(lower)){
    const d = new Date(); d.setDate(d.getDate() + 2);
    dateStr = d.toISOString().slice(0,10);
  }

  return { outOfScope: false, calories, dietTag, dateStr };
}

// Fill in your Supabase project's edge function URL once deployed, e.g.
// "https://limssbrcututebxiemqd.supabase.co/functions/v1/parse-diet-query"
const PARSE_QUERY_EDGE_FUNCTION_URL = "https://limssbrcututebxiemqd.supabase.co/functions/v1/parse-diet-query";

async function parsePlanQuerySmart(text){
  if(PARSE_QUERY_EDGE_FUNCTION_URL){
    try{
      const res = await fetch(PARSE_QUERY_EDGE_FUNCTION_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + SUPABASE_ANON_KEY },
        body: JSON.stringify({ query: text })
      });
      if(res.ok){
        const ai = await res.json();
        if(!ai.error){
          if(ai.outOfScope) return { outOfScope: true, usedAI: true };
          const d = new Date(); d.setDate(d.getDate() + (ai.dateOffsetDays || 0));
          return {
            outOfScope: false,
            calories: ai.calories || dailyGoals.calories,
            dietTag: ai.dietTag || null,
            dateStr: d.toISOString().slice(0,10),
            exclude: ai.exclude || [],
            usedAI: true
          };
        }
      }
    }catch(e){ console.warn("AI parser unavailable, falling back to pattern matching:", e); }
  }
  const local = parsePlanQuery(text);
  return { ...local, exclude: [], usedAI: false };
}

async function generateMealPlanFromQuery(){
  const input = document.getElementById("planQueryInput");
  const statusEl = document.getElementById("planGeneratorStatus");
  const text = input.value.trim();
  if(!text){ statusEl.textContent = "Type a request first, e.g. \"2000 cal low carb diet for tomorrow\"."; statusEl.className = "status error"; return; }

  statusEl.textContent = "Thinking…"; statusEl.className = "status";
  const parsed = await parsePlanQuerySmart(text);

  if(parsed.outOfScope){
    statusEl.textContent = "That doesn't look like a diet planning request — NutriRecipes can only help with meal/nutrition planning. Try something like \"2000 cal low carb diet for tomorrow.\"";
    statusEl.className = "status error";
    document.getElementById("planPreviewSlot").innerHTML = "";
    return;
  }

  const { calories, dietTag, dateStr, exclude, usedAI } = parsed;

  let pool = recipes.filter(rc => {
    if(dietTag){
      const totals = calcMacros(rc.ingredients).totals;
      if(!recipeDietTags(rc, totals).includes(dietTag)) return false;
    }
    if(exclude && exclude.length){
      const labels = [...recipeIngredientLabels(rc)];
      if(exclude.some(bad => labels.some(l => l.includes(bad.toLowerCase())))) return false;
    }
    return true;
  });

  if(!pool.length){
    statusEl.textContent = dietTag ? `No recipes tagged "${dietTag}" yet — try a different diet type.` : "No recipes available.";
    statusEl.className = "status error";
    document.getElementById("planPreviewSlot").innerHTML = "";
    return;
  }

  // Split target calories across meals, then pick the closest-matching recipe for each slot
  const MEAL_SHARE = { Breakfast: 0.25, Lunch: 0.35, Dinner: 0.30, Snacks: 0.10 };
  const used = new Set();
  const plan = [];
  MEAL_TYPES.forEach(meal => {
    const target = calories * MEAL_SHARE[meal];
    const candidates = pool.filter(rc => !used.has(rc.id));
    if(!candidates.length) return;
    let best = candidates[0], bestDiff = Infinity;
    candidates.forEach(rc => {
      const cal = calcMacros(rc.ingredients).totals.calories;
      const diff = Math.abs(cal - target);
      if(diff < bestDiff){ bestDiff = diff; best = rc; }
    });
    used.add(best.id);
    plan.push({ meal, recipe: best });
  });

  const planTotalCal = plan.reduce((s, p) => s + calcMacros(p.recipe.ingredients).totals.calories, 0);

  pendingPlan = { dateStr, entries: plan };
  statusEl.textContent = `${usedAI ? "✨ " : ""}Suggested plan for ${formatFullDate(dateStr)}${dietTag ? " · " + dietTag : ""} — ${r(planTotalCal)} kcal total (target ${calories}).${!usedAI && PARSE_QUERY_EDGE_FUNCTION_URL === "" ? " (Using pattern-matching — AI parser not yet configured.)" : ""}`;
  statusEl.className = "status";

  document.getElementById("planPreviewSlot").innerHTML = plan.map(p => {
    const cal = calcMacros(p.recipe.ingredients).totals.calories;
    return `<div class="plan-preview-meal">
      <div class="plan-preview-meal-title">${p.meal}</div>
      <div class="plan-preview-row"><span>${p.recipe.icon || "🍽️"} ${p.recipe.name}</span><span>${r(cal)} kcal</span></div>
    </div>`;
  }).join("") + `<div class="modal-actions" style="margin-top:14px;">
      <button class="btn text" onclick="dismissPlanPreview()">Discard</button>
      <button class="btn primary" onclick="acceptGeneratedPlan()">Add this plan to my diary</button>
    </div>`;
}

  pendingPlan = null;
  document.getElementById("planPreviewSlot").innerHTML = "";
  document.getElementById("planGeneratorStatus").textContent = "";
}

function acceptGeneratedPlan(){
  if(!pendingPlan) return;
  pendingPlan.entries.forEach(p => {
    const totals = calcMacros(p.recipe.ingredients).totals;
    dietChartEntries.push({
      id: Date.now() + "_" + Math.random().toString(36).slice(2,7),
      recipeId: p.recipe.id, recipeName: p.recipe.name, icon: p.recipe.icon,
      meal: p.meal, date: pendingPlan.dateStr, eaten: true,

    });

  saveDietChartEntries();
  state.view = { name: "dietchart", date: pendingPlan.dateStr };
  pendingPlan = null;
  render();
}

const DAY_ABBR = ["SUN","MON","TUE","WED","THU","FRI","SAT"];

function weekDatesFor(dateStr){
  const d = new Date(dateStr + "T00:00:00");
  const sunday = new Date(d);
  sunday.setDate(d.getDate() - d.getDay());
  const days = [];
  for(let i = 0; i < 7; i++){
    const day = new Date(sunday);
    day.setDate(sunday.getDate() + i);
    days.push(day.toISOString().slice(0,10));
  }
  return days;
}

function formatFullDate(dateStr){
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
}

const MEAL_COLORS = { Breakfast: "var(--meal-breakfast)", Lunch: "var(--meal-lunch)", Dinner: "var(--meal-dinner)", Snacks: "var(--meal-snack)" };

function renderDietChartView(){
  document.getElementById("tabBrowse").classList.remove("active");
  document.getElementById("tabDiary").classList.add("active");

  const dateStr = state.view.date;
  const dayEntries = dietChartEntries.filter(e => e.date === dateStr);
  const isEaten = e => e.eaten !== false;

  const eatenTotals = dayEntries.filter(isEaten).reduce((t, e) => {
    const cal = macroCalories(e.protein, e.carbs, e.fat);
    return { calories: t.calories + cal, protein: t.protein + e.protein, carbs: t.carbs + e.carbs, fat: t.fat + e.fat };
  }, { calories: 0, protein: 0, carbs: 0, fat: 0 });

  const mealEatenKcal = {};
  MEAL_TYPES.forEach(m => {
    mealEatenKcal[m] = dayEntries.filter(e => e.meal === m && isEaten(e)).reduce((s, e) => s + macroCalories(e.protein, e.carbs, e.fat), 0);
  });

  const isToday = dateStr === todayStr();
  const weekDays = weekDatesFor(dateStr);
  const overBudget = eatenTotals.calories > dailyGoals.calories;
  const remaining = Math.round(Math.abs(dailyGoals.calories - eatenTotals.calories));
  const pct = (num, den) => den > 0 ? Math.min(num / den * 100, 100) : 0;

  const container = document.createElement("div");
  container.className = "content";
  container.innerHTML = `
    <div class="plan-generator-box">
      <div class="filter-group-title" style="margin-bottom:8px;">✨ Generate a diet chart</div>
      <div class="row">
        <input type="text" id="planQueryInput" placeholder="e.g. '2000 cal low carb diet for tomorrow'">
        <button class="btn primary" onclick="generateMealPlanFromQuery()">Generate</button>
      </div>
      <div id="planGeneratorStatus" class="status"></div>
      <div id="planPreviewSlot"></div>
    </div>

    <div class="date-strip-row">
      <button class="icon-btn" onclick="changeChartWeek(-1)">‹</button>
      <div class="date-strip">
        ${weekDays.map((d, i) => `
          <button class="date-box ${d === dateStr ? "active" : ""}" onclick="setChartDate('${d}')">
            <span class="db-day">${DAY_ABBR[i]}</span>
            <span class="db-num">${Number(d.slice(8,10))}</span>
          </button>`).join("")}
      </div>
      <button class="icon-btn" onclick="changeChartWeek(1)">›</button>
    </div>

    ${isToday ? `<div class="diary-eyebrow">TODAY</div>` : ""}
    <h1 class="diary-date-heading">${formatFullDate(dateStr)}</h1>

    <div class="macro-summary-card">
      <button class="edit-goals-btn" onclick="openEditGoalsModal()">⚙ Edit daily goals</button>
      <div class="kcal-remaining-block">
        <div class="kcal-remaining-num ${overBudget ? "over" : ""}">${overBudget ? "-" : ""}${remaining}</div>
        <div class="kcal-remaining-label ${overBudget ? "over" : ""}">${overBudget ? "⚠️ KCAL OVER GOAL" : "KCAL REMAINING"}</div>
        <div class="kcal-remaining-sub">${r(eatenTotals.calories)} eaten · ${dailyGoals.calories} goal</div>
        <div class="meal-stack-track ${overBudget ? "over" : ""}">
          ${MEAL_TYPES.map(m => `<div class="meal-stack-fill" style="width:${pct(mealEatenKcal[m], dailyGoals.calories)}%; background:${MEAL_COLORS[m]};"></div>`).join("")}
        </div>
        <div class="meal-legend">
          ${MEAL_TYPES.map(m => `
            <div class="meal-legend-row">
              <span class="meal-dot" style="background:${MEAL_COLORS[m]}"></span>
              <span>${m}</span>
              <span class="meal-legend-kcal">${r(mealEatenKcal[m])}</span>
            </div>`).join("")}
        </div>
      </div>
      <div class="macro-bars">
        <div class="macro-bar-row">
          <div class="macro-bar-head"><span>Protein</span><span>${r(eatenTotals.protein)} / ${dailyGoals.protein}g</span></div>
          <div class="macro-bar-track"><div class="macro-bar-fill p" style="width:${pct(eatenTotals.protein, dailyGoals.protein)}%"></div></div>
        </div>
        <div class="macro-bar-row">
          <div class="macro-bar-head"><span>Carbs</span><span>${r(eatenTotals.carbs)} / ${dailyGoals.carbs}g</span></div>
          <div class="macro-bar-track"><div class="macro-bar-fill c" style="width:${pct(eatenTotals.carbs, dailyGoals.carbs)}%"></div></div>
        </div>
        <div class="macro-bar-row">
          <div class="macro-bar-head"><span>Fat</span><span>${r(eatenTotals.fat)} / ${dailyGoals.fat}g</span></div>
          <div class="macro-bar-track"><div class="macro-bar-fill f" style="width:${pct(eatenTotals.fat, dailyGoals.fat)}%"></div></div>
        </div>
      </div>
    </div>

    ${MEAL_TYPES.map(meal => renderMealSection(meal, dayEntries.filter(e => e.meal === meal))).join("")}
  `;
  document.getElementById("app").innerHTML = "";
  document.getElementById("app").appendChild(container);
}

function renderMealSection(meal, entries){
  const subtotal = entries.reduce((t, e) => t + macroCalories(e.protein, e.carbs, e.fat), 0);
  return `
    <div class="section-block">
      <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;">
        <h2 style="margin:0; font-size:17px; text-transform:none; letter-spacing:normal; color:var(--ink);">${meal}</h2>
        <span style="font-size:13px; color:var(--ink-soft);">${r(subtotal)} kcal</span>
      </div>
      ${entries.length ? entries.map(e => { const eaten = e.eaten !== false; const cal = macroCalories(e.protein, e.carbs, e.fat); return `
        <div class="diary-entry-row">
          <div class="diary-entry-left">
            <input type="checkbox" class="entry-checkbox" ${eaten ? "checked" : ""} onchange="toggleEntryEaten('${e.id}')">
            <div class="diary-entry-clickable" onclick="openRecipeDetailModal(${JSON.stringify(e.recipeId)})">
              <div class="diary-entry-name">${e.icon || "🍽️"} ${e.recipeName} <span class="diary-entry-chevron">View recipe ›</span></div>
              <div class="diary-entry-sub">1 serving(s) · ${eaten ? "Eaten" : "Planned"}</div>
              ${entryIngredientsLine(e)}
            </div>
          </div>
          <div class="diary-entry-right">
            <span class="diary-entry-kcal">${r(cal)} kcal</span>
            <button class="icon-x" onclick="removeDietChartEntry('${e.id}')">✕</button>
          </div>
        </div>`; }).join("") : `<p style="color:var(--ink-soft); font-size:13.5px; margin: 0;">Nothing added yet — find a recipe and tap "+ Add to chart."</p>`}
    </div>`;
}

function entryIngredientsLine(entry){
  const rc = recipes.find(x => String(x.id) === String(entry.recipeId));
  if(!rc || !rc.ingredients) return "";
  const lines = rc.ingredients.split("|").map(s => s.trim()).filter(Boolean);
  if(!lines.length) return "";
  return `<div class="diary-entry-ingredients">${lines.join(" · ")}</div>`;
}

function openEditGoalsModal(){
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.id = "goalsOverlay";
  overlay.innerHTML = `
    <div class="modal">
      <h2>Daily goals</h2>
      <div class="field"><label>Calories</label><input type="number" id="goalCal" value="${dailyGoals.calories}"></div>
      <div class="field"><label>Protein (g)</label><input type="number" id="goalProtein" value="${dailyGoals.protein}"></div>
      <div class="field"><label>Carbs (g)</label><input type="number" id="goalCarbs" value="${dailyGoals.carbs}"></div>
      <div class="field"><label>Fat (g)</label><input type="number" id="goalFat" value="${dailyGoals.fat}"></div>
      <div class="modal-actions">
        <button class="btn text" onclick="closeModal('goalsOverlay')">Cancel</button>
        <button class="btn primary" onclick="saveGoalsFromModal()">Save</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function saveGoalsFromModal(){
  dailyGoals = {
    calories: Number(document.getElementById("goalCal").value) || 2000,
    protein: Number(document.getElementById("goalProtein").value) || 140,
    carbs: Number(document.getElementById("goalCarbs").value) || 250,
    fat: Number(document.getElementById("goalFat").value) || 70
  };
  saveGoals(dailyGoals);
  closeModal("goalsOverlay");
  renderDietChartView();
}

/* ============ ADMIN ADD/EDIT (deferred — managed via Supabase Table Editor for now) ============ */

/* ============ MASTER RENDER ============ */
function render(){
  if(state.view.name === "grid") renderGridView();
  else if(state.view.name === "detail") renderDetailView(state.view.id);
  else if(state.view.name === "dietchart") renderDietChartView();
}

init();
initAuth();

if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch((e) => console.warn("Service worker failed to register:", e));
  });
}
</script>
</body>
</html>
