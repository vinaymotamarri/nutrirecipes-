<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriRecipes</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1D9E75">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg: #F7F7F5;
    --accent: #1D9E75;
    --accent-dark: #167A5B;
    --card: #FFFFFF;
    --border: #EAEAE6;
    --ink: #222222;
    --ink-soft: #8A8A85;
    --protein-bg: #E8F0FE; --protein-fg: #2B5FBF;
    --carb-bg: #FCEFE0; --carb-fg: #B5690E;
    --fat-bg: #FBEAEA; --fat-fg: #B23A3A;
    --dot-protein: #1D9E75;
    --dot-carbs: #C9821D;
    --dot-fat: #8B5CF6;
    --meal-breakfast: #C9821D;
    --meal-lunch: #1D9E75;
    --meal-dinner: #8B5CF6;
    --meal-snack: #2B7FD6;
    --tint-1: #D9EEE4; --tint-1-line: #C3E2D5;
    --tint-2: #E9E1F5; --tint-2-line: #DACDEE;
    --tint-3: #F3E7D3; --tint-3-line: #E8D5B4;
    --radius: 16px;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  a{ color: inherit; }
  button{ font-family: inherit; }

  /* ===== Loading screen ===== */
  #loadingScreen{
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100;
    gap: 14px;
  }
  .spinner{
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  #loadingScreen .msg{ color: var(--ink-soft); font-size: 14px; }

  /* ===== Header ===== */
  .header{
    max-width: 1180px;
    margin: 0 auto;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .brand{
    font-size: 18px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark{
    width: 30px; height: 30px;
    border-radius: 9px;
    background: var(--accent);
  }
  .tab-nav{ display: flex; align-items: center; gap: 28px; }
  .tab-link{
    background: none; border: none; cursor: pointer; font-family: inherit;
    font-size: 15px; font-weight: 600; color: var(--ink-soft);
    padding: 6px 0; border-bottom: 2px solid transparent;
  }
  .tab-link.active{ color: var(--ink); border-bottom-color: var(--accent); }
  .search-box{
    position: relative;
    max-width: 420px;
  }
  .search-box input{
    width: 100%;
    padding: 11px 16px 11px 38px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--card);
    font-size: 14px;
    outline: none;
  }
  .search-box input:focus{ border-color: var(--accent); }
  .search-box .icon{
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--ink-soft); font-size: 14px; pointer-events:none;
  }
  .icon-btn{
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    display: flex; align-items:center; justify-content:center;
    cursor: pointer;
    font-size: 16px;
    color: var(--ink-soft);
    flex-shrink: 0;
  }
  .icon-btn:hover{ border-color: var(--accent); color: var(--accent); }

  /* ===== Data source banners ===== */
  .data-banner{
    max-width: 1180px;
    margin: 16px auto 0;
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 13.5px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .data-banner.warn{ background: #FFF6E5; color: #8A5A00; border: 1px solid #F0DBA0; }
  .data-banner.error{ background: #FBEAEA; color: #B23A3A; border: 1px solid #F0BABA; }
  .data-banner button{
    border: 1px solid currentColor;
    background: none;
    color: inherit;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
  }

  /* ===== Content wrap (used by detail + diary pages) ===== */
  .content{
    max-width: 1180px;
    margin: 0 auto;
    padding: 28px 24px 120px;
  }
  .result-count{
    font-size: 14px;
    color: var(--ink-soft);
    margin: 4px 0 16px;
  }
  .result-count b{ color: var(--ink); }

  /* ===== Browse layout ===== */
  .browse-layout{
    max-width: 1180px;
    margin: 0 auto;
    padding: 28px 24px 120px;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 40px;
    align-items: start;
  }
  .filters-sidebar{ position: sticky; top: 24px; }
  .filters-sidebar h2{ font-size: 20px; margin: 0 0 18px; }
  .filter-group{ margin-bottom: 26px; }
  .filter-group-title{
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 12px;
  }
  .filter-check-row{
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    cursor: pointer;
    font-size: 14.5px;
  }
  .filter-check-row input[type=checkbox]{
    width: 16px; height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .filter-check-row .fc-label{ flex: 1; }
  .filter-check-row .fc-count{ color: var(--ink-soft); font-size: 13px; }

  .browse-main-head{ margin-bottom: 20px; }
  .browse-main-head h1{ font-size: 34px; margin: 0 0 6px; }
  .browse-main-head p{ color: var(--ink-soft); font-size: 15px; margin: 0 0 20px; }
  .browse-search-row{ display: flex; align-items: center; gap: 16px; }
  .browse-search-row .search-box{ flex: 1; }
  .browse-search-row .result-count-inline{ font-size: 14.5px; color: var(--ink-soft); white-space: nowrap; }
  .browse-search-row .result-count-inline b{ color: var(--ink); }

  /* ===== Recipe cards (redesign) ===== */
  .recipe-grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
    margin-top: 22px;
  }
  .recipe-card{
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow 0.15s ease, transform 0.15s ease;
  }
  .recipe-card:hover{ box-shadow: 0 10px 24px -14px rgba(0,0,0,0.25); transform: translateY(-2px); }
  .recipe-photo{
    height: 150px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .recipe-photo img{ width: 100%; height: 100%; object-fit: cover; }
  .recipe-photo.placeholder{
    background-image: repeating-linear-gradient(45deg, var(--tint-line) 0, var(--tint-line) 2px, var(--tint) 2px, var(--tint) 14px);
  }
  .recipe-photo.tint-1{ --tint: var(--tint-1); --tint-line: var(--tint-1-line); }
  .recipe-photo.tint-2{ --tint: var(--tint-2); --tint-line: var(--tint-2-line); }
  .recipe-photo.tint-3{ --tint: var(--tint-3); --tint-line: var(--tint-3-line); }
  .recipe-photo span{
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: rgba(0,0,0,0.35);
  }
  .recipe-card-body{ padding: 16px 18px 18px; }
  .recipe-tags{ display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .recipe-tag{
    background: var(--bg); border: 1px solid var(--border);
    font-size: 11.5px; font-weight: 600; padding: 4px 10px; border-radius: 999px; color: var(--ink-soft);
  }
  .recipe-title{ font-size: 16.5px; font-weight: 700; margin: 0 0 10px; line-height: 1.3; }
  .recipe-kcal{ font-size: 14px; color: var(--ink-soft); margin-bottom: 10px; }
  .recipe-kcal b{ font-size: 22px; color: var(--ink); font-weight: 800; }
  .recipe-macro-dots{ display: flex; gap: 14px; font-size: 13px; color: var(--ink-soft); margin-bottom: 12px; }
  .recipe-macro-dots span{ display: flex; align-items: center; gap: 5px; }
  .macro-dot{ width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .macro-dot.p{ background: var(--dot-protein); }
  .macro-dot.c{ background: var(--dot-carbs); }
  .macro-dot.f{ background: var(--dot-fat); }
  .add-to-chart-btn{
    width: 100%;
    padding: 8px 0;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--accent-dark);
    font-weight: 600;
    font-size: 12.5px;
    cursor: pointer;
  }
  .add-to-chart-btn:hover{ background: #E4EEE7; border-color: var(--accent); }

  @media (max-width: 820px){
    .browse-layout{ grid-template-columns: 1fr; }
    .filters-sidebar{ position: static; }
  }
  .card{
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 18px 20px;
    text-align: center;
    cursor: pointer;
    transition: box-shadow 0.15s ease, transform 0.15s ease;
  }
  .card:hover{
    box-shadow: 0 10px 24px -14px rgba(0,0,0,0.25);
    transform: translateY(-2px);
  }
  .card-icon{
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--bg);
    font-size: 30px;
    display: flex; align-items:center; justify-content:center;
    margin: 0 auto 12px;
    overflow: hidden;
  }
  .card-thumb-img{
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .card-title{
    font-size: 16px;
    font-weight: 700;
    margin: 0 0 10px;
    line-height: 1.3;
  }
  .cal-pill{
    display: inline-block;
    background: #FCEFE0;
    color: #B5690E;
    font-size: 12.5px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 999px;
    margin-bottom: 10px;
  }
  .macro-badges{
    display: flex;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .badge{
    font-size: 11.5px;
    font-weight: 700;
    padding: 4px 9px;
    border-radius: 999px;
  }
  .badge.p{ background: var(--protein-bg); color: var(--protein-fg); }
  .badge.c{ background: var(--carb-bg); color: var(--carb-fg); }
  .badge.f{ background: var(--fat-bg); color: var(--fat-fg); }

  .empty-state{
    grid-column: 1 / -1;
    text-align: center;
    padding: 70px 20px;
    color: var(--ink-soft);
  }
  .empty-state h3{ color: var(--ink); font-size: 19px; margin: 0 0 6px; }
  .empty-state button{
    margin-top: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 999px;
    font-weight: 600;
    cursor: pointer;
  }

  .add-to-chart-btn{
    width: 100%;
    margin-top: 12px;
    padding: 8px 0;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--accent-dark);
    font-weight: 600;
    font-size: 12.5px;
    cursor: pointer;
  }
  .add-to-chart-btn:hover{ background: #E4EEE7; border-color: var(--accent); }

  .meal-choice-row{ display: flex; gap: 8px; flex-wrap: wrap; }
  .meal-choice-btn{
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--ink);
  }
  .meal-choice-btn.active{ background: var(--accent); border-color: var(--accent); color: #fff; }

  .icon-x{
    border: none; background: none; color: var(--ink-soft); cursor: pointer;
    font-size: 13px; padding: 2px 4px; margin-left: 6px;
  }
  .icon-x:hover{ color: #B23A3A; }

  /* ===== FAB ===== */
  .fab{
    position: fixed;
    right: 28px; bottom: 28px;
    width: 58px; height: 58px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none;
    font-size: 28px;
    line-height: 1;
    box-shadow: 0 8px 20px -6px rgba(29,158,117,0.6);
    cursor: pointer;
    z-index: 40;
  }
  .fab:hover{ background: var(--accent-dark); }

  /* ===== Detail view ===== */
  .back-btn{
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    padding: 8px 0 18px;
  }
  .back-btn:hover{ color: var(--accent); }
  .detail-hero{
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 34px 24px;
    text-align: center;
    margin-bottom: 20px;
  }
  .detail-hero .card-icon{ width: 84px; height: 84px; font-size: 40px; }
  .detail-hero h1{ font-size: 24px; margin: 4px 0 14px; }
  .detail-hero .cal-pill{ font-size: 14px; padding: 7px 16px; }
  .detail-hero .macro-badges{ margin-top: 12px; }
  .detail-hero .badge{ font-size: 13px; padding: 6px 12px; }

  .section-block{
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 20px;
  }
  .section-block h2{
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    margin: 0 0 14px;
  }

  /* ===== Diary view ===== */
  .date-strip-row{ display: flex; align-items: center; gap: 8px; margin-bottom: 18px; }
  .date-strip{ display: flex; gap: 8px; flex: 1; overflow-x: auto; }
  .date-box{
    flex: 1; min-width: 52px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 4px; text-align: center; cursor: pointer;
    display: flex; flex-direction: column; gap: 2px;
  }
  .date-box .db-day{ font-size: 10.5px; font-weight: 700; letter-spacing: 0.04em; color: var(--ink-soft); }
  .date-box .db-num{ font-size: 15px; font-weight: 700; color: var(--ink); }
  .date-box.active{ background: var(--accent); border-color: var(--accent); }
  .date-box.active .db-day, .date-box.active .db-num{ color: #fff; }

  .diary-eyebrow{ font-size: 11.5px; font-weight: 700; letter-spacing: 0.08em; color: var(--ink-soft); text-transform: uppercase; }
  .diary-date-heading{ font-size: 28px; margin: 2px 0 20px; }

  .macro-summary-card{
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 24px; margin-bottom: 24px; display: flex; align-items: flex-start; gap: 40px; flex-wrap: wrap;
  }
  .kcal-remaining-block{ min-width: 220px; }
  .kcal-remaining-num{ font-size: 40px; font-weight: 800; line-height: 1; }
  .kcal-remaining-label{ font-size: 11.5px; font-weight: 700; letter-spacing: 0.06em; color: var(--ink-soft); margin: 4px 0 6px; }
  .kcal-remaining-sub{ font-size: 13px; color: var(--ink-soft); margin-bottom: 12px; }
  .meal-stack-track{ display: flex; height: 8px; border-radius: 999px; background: var(--bg); overflow: hidden; margin-bottom: 14px; }
  .meal-stack-fill{ height: 100%; }
  .meal-legend-row{ display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 3px 0; }
  .meal-legend-row span:nth-child(2){ flex: 1; color: var(--ink); }
  .meal-legend-kcal{ color: var(--ink-soft); }
  .meal-dot{ width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .macro-bars{ flex: 1; min-width: 220px; }
  .macro-bar-row{ margin-bottom: 14px; }
  .macro-bar-row:last-of-type{ margin-bottom: 0; }
  .macro-bar-head{ display: flex; justify-content: space-between; font-size: 13.5px; font-weight: 600; margin-bottom: 6px; }
  .macro-bar-head span:last-child{ color: var(--ink-soft); font-weight: 500; }
  .macro-bar-track{ height: 8px; border-radius: 999px; background: var(--bg); overflow: hidden; }
  .macro-bar-fill{ height: 100%; border-radius: 999px; }
  .macro-bar-fill.p{ background: var(--dot-protein); }
  .macro-bar-fill.c{ background: var(--dot-carbs); }
  .macro-bar-fill.f{ background: var(--dot-fat); }

  .diary-entry-row{
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .diary-entry-row:last-child{ border-bottom: none; }
  .diary-entry-left{ display: flex; align-items: center; gap: 12px; }
  .entry-checkbox{
    width: 20px; height: 20px; border-radius: 50%; accent-color: var(--accent); cursor: pointer; flex-shrink: 0;
  }
  .diary-entry-name{ font-weight: 600; font-size: 14.5px; }
  .diary-entry-sub{ font-size: 12.5px; color: var(--ink-soft); margin-top: 2px; }
  .diary-entry-right{ display: flex; align-items: center; }
  .diary-entry-kcal{ font-weight: 700; font-size: 14px; }

  .video-yt, .video-ig{
    display: block;
    text-decoration: none;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }
  .video-yt img{ width: 100%; display: block; }
  .video-yt .play{
    position: absolute; top:50%; left:50%; transform: translate(-50%,-50%);
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(0,0,0,0.65);
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size: 22px;
  }
  .video-ig{
    background: #111;
    color: #fff;
    padding: 28px;
    text-align: center;
    font-weight: 600;
  }
  .video-ig .ig-badge{
    display:inline-block; margin-bottom:8px; font-size: 26px;
  }
  .no-video{ color: var(--ink-soft); font-size: 14px; }

  .ingredient-row{
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .ingredient-row:last-child{ border-bottom: none; }
  .ingredient-row .name{ font-weight: 600; text-transform: capitalize; }
  .ingredient-row .macro-mini{ color: var(--ink-soft); font-size: 12.5px; }
  .ingredient-row.unmatched .name{ color: #B23A3A; }
  .ingredient-row.unmatched .macro-mini::after{ content: " (not found in food database)"; }

  .ingredient-row-editable{
    display: grid;
    grid-template-columns: 64px auto 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .ingredient-row-editable:last-child{ border-bottom: none; }
  .ingredient-row-editable.unmatched{ color: #B23A3A; }
  .ing-qty-input{
    width: 100%; padding: 7px 8px; border-radius: 8px; border: 1px solid var(--border);
    font-size: 13.5px; font-weight: 600; text-align: right;
  }
  .ing-qty-input:focus{ outline: 2px solid var(--accent); border-color: var(--accent); }
  .ing-unit{ font-size: 11px; color: var(--ink-soft); }
  .ing-name-input{
    padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border);
    font-size: 13.5px; font-weight: 600; text-transform: capitalize; background: var(--bg);
    width: 100%;
  }
  .ing-name-input:focus{ outline: 2px solid var(--accent); border-color: var(--accent); }

  .steps-list{ margin: 0; padding-left: 20px; }
  .steps-list li{ margin-bottom: 12px; line-height: 1.5; font-size: 14.5px; }
  .steps-list li:last-child{ margin-bottom: 0; }

  /* ===== Modal (Add Recipe / Settings) ===== */
  .modal-overlay{
    position: fixed; inset: 0;
    background: rgba(20,20,18,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 60;
    padding: 20px;
  }
  .modal{
    background: var(--card);
    border-radius: var(--radius);
    width: 100%;
    max-width: 520px;
    max-height: 88vh;
    overflow-y: auto;
    padding: 26px;
  }
  .modal h2{ margin: 0 0 18px; font-size: 19px; }
  .field{ margin-bottom: 16px; }
  .field label{
    display: block;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--ink-soft);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .field input, .field textarea{
    width: 100%;
    padding: 10px 13px;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    resize: vertical;
  }
  .field input:focus, .field textarea:focus{ border-color: var(--accent); }

/* ============ MACRO ENGINE ============ */
function parseIngredientLine(line){
  const tokens = line.trim().split(/\s+/);
  if(tokens.length < 2) return null;
  const qty = parseFloat(tokens[0]);
  if(isNaN(qty)) return null;
  let name, unit;
  if(UNITS.includes(tokens[1].toLowerCase())){
    unit = tokens[1].toLowerCase();
    name = tokens.slice(2).join(" ");
  } else {
    unit = "pc";
    name = tokens.slice(1).join(" ");
  }
  return { qty, name: name.trim().toLowerCase(), raw: line.trim(), unit };
}

function findFood(name){
  if(ALIASES[name]){
    const f = foodDB.find(f => f.food_item === ALIASES[name]);
    if(f) return f;
  }
  let exact = foodDB.find(f => f.food_item === name);
  if(exact) return exact;
  // Combined-option names like "rice/wheat flour/quinoa/semiya" — match if the
  // ingredient name equals the FIRST listed option. This is checked before the
  // loose substring fallback so it can't be shadowed by an unrelated item
  // (e.g. "rice flour") that also happens to contain the same substring.
  let firstOptionMatch = foodDB.find(f => f.food_item.split("/")[0].trim() === name);
  if(firstOptionMatch) return firstOptionMatch;
  let partial = foodDB.find(f => f.food_item.includes(name) || name.includes(f.food_item));
  if(partial) return partial;
  return null;
}

function calcMacros(ingredientsStr, overrides){
  overrides = overrides || {};
  const lines = (ingredientsStr || "").split("|").map(s => s.trim()).filter(Boolean);
  const totals = { calories: 0, fat: 0, carbs: 0, protein: 0 };
  const details = [];
  lines.forEach((line, idx) => {
    const parsed = parseIngredientLine(line);
    if(!parsed){ details.push({ raw: line, matched: false, idx }); return; }
    const ov = overrides[idx] || {};
    const qty = (ov.qty !== undefined && ov.qty !== null && ov.qty !== "") ? Number(ov.qty) : parsed.qty;
    const name = ov.name || parsed.name;
    const food = findFood(name);
    if(!food){ details.push({ ...parsed, qty, name, matched: false, idx }); return; }
    const scale = qty / food.quantity;
    const m = { calories: food.calories*scale, fat: food.fat*scale, carbs: food.carbs*scale, protein: food.protein*scale };
    totals.calories += m.calories; totals.fat += m.fat; totals.carbs += m.carbs; totals.protein += m.protein;
    details.push({ ...parsed, qty, name, matched: true, macros: m, dbItem: food.food_item, idx });
  });
  return { totals, details };
}

/* ============ FILTER HELPERS ============ */
const CAL_BUCKETS = [
  { key: "under300", label: "Under 300 kcal", test: c => c < 300 },
  { key: "300to500", label: "300–500 kcal", test: c => c >= 300 && c < 500 },
  { key: "500to750", label: "500–750 kcal", test: c => c >= 500 && c < 750 },
  { key: "750plus", label: "750+ kcal", test: c => c >= 750 }
];
const NON_VEG_KEYWORDS = ["chicken", "egg", "fish", "turkey", "shrimp"];

function recipeIngredientLabels(rc){
  const labels = new Set();
  (rc.ingredients || "").split("|").map(s => s.trim()).filter(Boolean).forEach(line => {
    const parsed = parseIngredientLine(line);
    if(!parsed) return;
    const food = findFood(parsed.name);
    const label = food ? food.food_item : parsed.name;
    const shortLabel = label.split("/")[0].split("(")[0].trim();
    if(shortLabel) labels.add(shortLabel);
  });
  return labels;
}

// Diet-type tags are derived heuristically from ingredients/macros — there's no
// separately curated "diet type" field in the data, so treat these as estimates.
function recipeDietTags(rc, totals){
  const labels = [...recipeIngredientLabels(rc)];
  const isVeg = !labels.some(l => NON_VEG_KEYWORDS.some(k => l.includes(k)));
  const proteinRatio = totals.calories > 0 ? (totals.protein * 4) / totals.calories : 0;
  const carbRatio = totals.calories > 0 ? (totals.carbs * 4) / totals.calories : 0;
  const fatRatio = totals.calories > 0 ? (totals.fat * 9) / totals.calories : 0;
  const tags = [];
  if(isVeg) tags.push("Vegetarian");
  if(proteinRatio >= 0.28) tags.push("High Protein");
  if(totals.carbs <= 30) tags.push("Low Carb");
  if(fatRatio >= 0.55 && carbRatio <= 0.12) tags.push("Keto-Friendly");
  return tags;
}

function matchesSearch(rc, term){
  if(!term) return true;
  const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const re = new RegExp("\\b" + escaped, "i");
  if(re.test(rc.name)) return true;
  return [...recipeIngredientLabels(rc)].some(label => re.test(label));
}

function passesFilters(rc){
  const totals = calcMacros(rc.ingredients).totals;
  const bucketOk = state.calBuckets.size === 0 || [...state.calBuckets].some(key => CAL_BUCKETS.find(b => b.key === key).test(totals.calories));
  const dietTags = recipeDietTags(rc, totals);
  const dietOk = state.dietTags.size === 0 || [...state.dietTags].some(t => dietTags.includes(t));
  const searchOk = matchesSearch(rc, state.search);
  return bucketOk && dietOk && searchOk;
}

  } else if(dataSource === "unavailable"){
    const banner = document.createElement("div");
    banner.className = "data-banner error";
    banner.innerHTML = `🔌 Couldn't load recipes right now. Check your connection and try again. <button onclick="refreshData()">Retry</button>`;
    container.appendChild(banner);
  }

  const filtered = recipes.filter(passesFilters);

  // Diet-type counts for the sidebar (computed once per render, over the full recipe set)
  const dietCounts = {};
  recipes.forEach(rc => {
    const totals = calcMacros(rc.ingredients).totals;
    recipeDietTags(rc, totals).forEach(t => { dietCounts[t] = (dietCounts[t] || 0) + 1; });
  });
  const DIET_TYPES = ["Vegetarian", "High Protein", "Low Carb", "Keto-Friendly"];

  const calCounts = {};
  recipes.forEach(rc => {
    const totals = calcMacros(rc.ingredients).totals;
    const bucket = CAL_BUCKETS.find(b => b.test(totals.calories));
    if(bucket) calCounts[bucket.key] = (calCounts[bucket.key] || 0) + 1;
  });

  const layout = document.createElement("div");
  layout.className = "browse-layout";
  layout.innerHTML = `
    <div class="filters-sidebar">
      <h2>Filters</h2>
      <div class="filter-group">
        <div class="filter-group-title">Diet type</div>
        ${DIET_TYPES.map(t => `
          <label class="filter-check-row">
            <input type="checkbox" ${state.dietTags.has(t) ? "checked" : ""} onchange="toggleDietTag('${t}')">
            <span class="fc-label">${t}</span>
            <span class="fc-count">${dietCounts[t] || 0}</span>
          </label>`).join("")}
      </div>
      <div class="filter-group">
        <div class="filter-group-title">Calories</div>
        ${CAL_BUCKETS.map(b => `
          <label class="filter-check-row">
            <input type="checkbox" ${state.calBuckets.has(b.key) ? "checked" : ""} onchange="toggleCalBucket('${b.key}')">
            <span class="fc-label">${b.label}</span>
            <span class="fc-count">${calCounts[b.key] || 0}</span>
          </label>`).join("")}
      </div>
    </div>
    <div class="browse-main">
      <div class="browse-main-head">
        <h1>Recipes</h1>
        <p>Find a recipe and log it to your diary in a couple taps.</p>
        <div class="browse-search-row">
          <div class="search-box">
            <span class="icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search recipes…" value="${state.search.replace(/"/g, "&quot;")}" oninput="onSearch(this.value)">
          </div>
          <span class="result-count-inline"><b>${filtered.length}</b> recipe${filtered.length === 1 ? "" : "s"}</span>
        </div>
      </div>
      <div class="recipe-grid" id="recipeGrid"></div>
    </div>
  `;
  container.appendChild(layout);

  document.getElementById("app").innerHTML = "";
  document.getElementById("app").appendChild(container);

  if(prevSearchFocused){
    const el = document.getElementById("searchInput");
    if(el){ el.focus(); el.setSelectionRange(prevCursorPos, prevCursorPos); }
  }

  const grid = document.getElementById("recipeGrid");
  if(filtered.length === 0){
    if(recipes.length === 0){
      grid.innerHTML = `<div class="empty-state">
        <h3>No recipes to show right now</h3>
        <p>${dataSource === "unavailable" ? "We couldn't reach the recipe database." : "Nothing here yet."}</p>
        <button onclick="refreshData()">Retry</button>
      </div>`;
    } else {
      grid.innerHTML = `<div class="empty-state">
        <h3>No recipes match those filters</h3>
        <p>Try clearing a filter or your search.</p>
        <button onclick="clearAllFilters()">Clear filters</button>
      </div>`;
    }
    return;
  }
  filtered.forEach((rc, i) => {
    const totals = calcMacros(rc.ingredients).totals;
    const dietTags = recipeDietTags(rc, totals);
    const ytId = youtubeId(rc.video_url);
    const hasRealPhoto = !!(rc.thumbnail_url || ytId);
    const tintClass = "tint-" + ((i % 3) + 1);

    const card = document.createElement("div");
    card.className = "recipe-card";
    card.onclick = () => { state.view = { name: "detail", id: rc.id, overrides: {} }; render(); };
    card.innerHTML = `
      <div class="recipe-photo ${hasRealPhoto ? "" : "placeholder " + tintClass}">
        ${hasRealPhoto ? `<img src="${rc.thumbnail_url || ("https://img.youtube.com/vi/" + ytId + "/hqdefault.jpg")}" alt="">` : `<span>Recipe photo</span>`}
      </div>
      <div class="recipe-card-body">
        ${dietTags.length ? `<div class="recipe-tags">${dietTags.slice(0,2).map(t => `<span class="recipe-tag">${t}</span>`).join("")}</div>` : ""}
        <div class="recipe-title">${rc.name}</div>
        <div class="recipe-kcal"><b>${r(totals.calories)}</b> kcal / serving</div>
        <div class="recipe-macro-dots">
          <span><i class="macro-dot p"></i>${r(totals.protein)}g P</span>
          <span><i class="macro-dot c"></i>${r(totals.carbs)}g C</span>
          <span><i class="macro-dot f"></i>${r(totals.fat)}g F</span>
        </div>
        <button class="add-to-chart-btn" onclick="event.stopPropagation(); openAddToChartModal(${rc.id})">+ Add to chart</button>
      </div>`;
    grid.appendChild(card);
  });
}

function toggleDietTag(tag){
  state.dietTags.has(tag) ? state.dietTags.delete(tag) : state.dietTags.add(tag);
  render();
}
function toggleCalBucket(key){
  state.calBuckets.has(key) ? state.calBuckets.delete(key) : state.calBuckets.add(key);
  render();
}

function clearAllFilters(){
  state.calBuckets.clear(); state.dietTags.clear(); state.search = "";
  render();
}

function onSearch(v){ state.search = v; render(); }

/* ============ RENDER: DETAIL ============ */
function youtubeId(url){
  if(!url) return null;
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{6,})/);
  return m ? m[1] : null;
}

function cardThumb(rc){
  if(rc.thumbnail_url) return `<img class="card-thumb-img" src="${rc.thumbnail_url}" alt="">`;
  const ytId = youtubeId(rc.video_url);
  if(ytId) return `<img class="card-thumb-img" src="https://img.youtube.com/vi/${ytId}/hqdefault.jpg" alt="">`;
  return rc.icon || "🍽️";
}

function renderVideoBlock(url){
  if(!url) return `<div class="no-video">No video added yet.</div>`;
  const ytId = youtubeId(url);
  if(ytId){
    return `<a class="video-yt" href="${url}" target="_blank" rel="noopener">
      <img src="https://img.youtube.com/vi/${ytId}/hqdefault.jpg" alt="Video thumbnail">
      <span class="play">▶</span>
    </a>`;
  }
  if(url.includes("instagram.com")){
    return `<a class="video-ig" href="${url}" target="_blank" rel="noopener">
      <span class="ig-badge">📷</span><br>View on Instagram
    </a>`;
  }
  return `<a class="video-ig" href="${url}" target="_blank" rel="noopener">▶ Watch video</a>`;
}

function renderDetailView(id){
  const rc = recipes.find(x => String(x.id) === String(id));
  const container = document.createElement("div");
  container.className = "content";
  if(!rc){
    container.innerHTML = `<button class="back-btn" onclick="goHome()">← Back</button><p>Recipe not found.</p>`;
    document.getElementById("app").innerHTML = ""; document.getElementById("app").appendChild(container);
    return;
  }
  if(!state.view.overrides) state.view.overrides = {};
  const overrides = state.view.overrides;
  const { totals, details } = calcMacros(rc.ingredients, overrides);
  const steps = (rc.steps || "").split("|").map(s => s.trim()).filter(Boolean);
  const hasOverrides = Object.keys(overrides).length > 0;

  container.innerHTML = `
    <button class="back-btn" onclick="goHome()">← Back to recipes</button>
    <div class="detail-hero">
      <div class="card-icon" style="margin:0 auto 10px;">${cardThumb(rc)}</div>
      <h1>${rc.name}</h1>
      <div class="cal-pill" id="heroCalPill">${r(totals.calories)} kcal</div>
      <div class="macro-badges" id="heroMacroBadges">
        <span class="badge p">Protein ${r(totals.protein)}g</span>
        <span class="badge c">Carbs ${r(totals.carbs)}g</span>
        <span class="badge f">Fat ${r(totals.fat)}g</span>
      </div>
      <button class="btn primary" style="margin-top:16px;" onclick="openAddToChartModal(${rc.id}, {calories:${totals.calories},protein:${totals.protein},carbs:${totals.carbs},fat:${totals.fat}})">+ Add to diet chart</button>
    </div>
    <div class="section-block">
      <h2>Video</h2>
      ${renderVideoBlock(rc.video_url)}
    </div>
    <div class="section-block">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
        <h2 style="margin:0;">Ingredients — adjust to fit your portion</h2>
        ${hasOverrides ? `<button class="btn small" onclick="resetIngredientOverrides()">↺ Reset to original</button>` : ""}
      </div>
      <div id="ingredientRows">
        <datalist id="foodOptionsDatalist">
          ${foodDB.map(f => `<option value="${f.food_item}">`).join("")}
        </datalist>
        ${details.map(d => renderIngredientRow(d)).join("") || "<p>No ingredients listed.</p>"}
      </div>
    </div>
    <div class="section-block">
      <h2>Steps</h2>
      ${steps.length ? `<ol class="steps-list">${steps.map(s => `<li>${s}</li>`).join("")}</ol>` : "<p>No steps listed.</p>"}
    </div>
  `;
  document.getElementById("app").innerHTML = "";
  document.getElementById("app").appendChild(container);
}

function renderIngredientRow(d){
  const displayName = (d.dbItem || d.name || "").split("(")[0].trim();
  return `
    <div class="ingredient-row-editable ${d.matched ? "" : "unmatched"}">
      <input type="number" class="ing-qty-input" value="${d.qty}" min="0" step="1"
        onchange="updateIngredientQty(${d.idx}, this.value)">
      <span class="ing-unit">${d.unit || "g"}</span>
      <input type="text" class="ing-name-input" list="foodOptionsDatalist" value="${displayName}"
        placeholder="type to swap, e.g. 'pan' for paneer options"
        onchange="updateIngredientFood(${d.idx}, this.value)">
      <span class="macro-mini">${d.matched ? r(d.macros.calories) + " kcal" : "not found"}</span>
    </div>`;
}

function updateIngredientQty(idx, val){
  if(!state.view.overrides) state.view.overrides = {};
  if(!state.view.overrides[idx]) state.view.overrides[idx] = {};
  state.view.overrides[idx].qty = val;
  renderDetailView(state.view.id);
}

function updateIngredientFood(idx, val){
  if(!state.view.overrides) state.view.overrides = {};
  if(!state.view.overrides[idx]) state.view.overrides[idx] = {};
  const cleaned = (val || "").trim().toLowerCase();
  if(cleaned) state.view.overrides[idx].name = cleaned;
  else delete state.view.overrides[idx].name;
  renderDetailView(state.view.id);
}

function resetIngredientOverrides(){
  state.view.overrides = {};
  renderDetailView(state.view.id);
}

function goHome(){ state.view = { name: "grid" }; render(); }

/* ============ DIET CHART (local only — no login, saved on this device) ============ */
const MEAL_TYPES = ["Breakfast", "Lunch", "Dinner", "Snacks"];

function loadDietChart(){
  try{ return JSON.parse(localStorage.getItem("nr_diet_chart")) || []; }catch(e){ return []; }
}
function saveDietChartEntries(){
  localStorage.setItem("nr_diet_chart", JSON.stringify(dietChartEntries));
}
let dietChartEntries = loadDietChart();

function todayStr(){ return new Date().toISOString().slice(0,10); }

function closeModal(id){
  const el = document.getElementById(id);
  if(el) el.remove();
}

let pendingAddToChart = null;

function openAddToChartModal(recipeId, totals){
  const rc = recipes.find(x => String(x.id) === String(recipeId));
  if(!rc) return;
  if(!totals) totals = calcMacros(rc.ingredients).totals;
  pendingAddToChart = { recipe: rc, totals, meal: "Breakfast" };

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.id = "addToChartOverlay";
  overlay.innerHTML = `
    <div class="modal">
      <h2>Add "${rc.name}" to your diet chart</h2>
      <div class="field">
        <label>Meal</label>
        <div class="meal-choice-row" id="mealChoiceRow">
          ${MEAL_TYPES.map((m,i) => `<button type="button" class="meal-choice-btn ${i===0?"active":""}" data-meal="${m}" onclick="selectMealChoice('${m}')">${m}</button>`).join("")}
        </div>
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="addToChartDate" value="${todayStr()}">
      </div>
      <div class="hint">${r(totals.calories)} kcal · P${r(totals.protein)}g C${r(totals.carbs)}g F${r(totals.fat)}g will be logged for this entry.</div>
      <div class="modal-actions">
        <button class="btn text" onclick="closeModal('addToChartOverlay')">Cancel</button>
        <button class="btn primary" onclick="confirmAddToChart()">Add</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

function selectMealChoice(meal){
  pendingAddToChart.meal = meal;
  document.querySelectorAll(".meal-choice-btn").forEach(b => b.classList.toggle("active", b.dataset.meal === meal));
}

function confirmAddToChart(){
  const dateStr = document.getElementById("addToChartDate").value;
  if(!dateStr){ alert("Pick a date first."); return; }
  const { recipe, totals, meal } = pendingAddToChart;
  dietChartEntries.push({
    id: Date.now() + "_" + Math.random().toString(36).slice(2,7),
    recipeId: recipe.id, recipeName: recipe.name, icon: recipe.icon,
    meal, date: dateStr, eaten: true,
    calories: totals.calories, protein: totals.protein, carbs: totals.carbs, fat: totals.fat
  });
  saveDietChartEntries();
  closeModal("addToChartOverlay");
  pendingAddToChart = null;
  if(state.view.name === "dietchart") renderDietChartView();
}

function toggleEntryEaten(id){
  const entry = dietChartEntries.find(e => e.id === id);
  if(entry) entry.eaten = !(entry.eaten !== false);
  saveDietChartEntries();
  renderDietChartView();
}

function removeDietChartEntry(id){
  dietChartEntries = dietChartEntries.filter(e => e.id !== id);
  saveDietChartEntries();
  renderDietChartView();
}

function loadGoals(){
  try{ return JSON.parse(localStorage.getItem("nr_goals")) || { calories: 2000, protein: 140, carbs: 250, fat: 70 }; }
  catch(e){ return { calories: 2000, protein: 140, carbs: 250, fat: 70 }; }
}
function saveGoals(g){ localStorage.setItem("nr_goals", JSON.stringify(g)); }
let dailyGoals = loadGoals();

function openDietChartView(){
  state.view = { name: "dietchart", date: todayStr() };
  render();
}

function changeChartDate(delta){
  const d = new Date(state.view.date + "T00:00:00");
  d.setDate(d.getDate() + delta);
  state.view.date = d.toISOString().slice(0,10);
  renderDietChartView();
}

function changeChartWeek(deltaWeeks){
  const d = new Date(state.view.date + "T00:00:00");
  d.setDate(d.getDate() + deltaWeeks * 7);
  state.view.date = d.toISOString().slice(0,10);
  renderDietChartView();
}

function setChartDate(val){
  state.view.date = val;
  renderDietChartView();
}

const DAY_ABBR = ["SUN","MON","TUE","WED","THU","FRI","SAT"];

function weekDatesFor(dateStr){
  const d = new Date(dateStr + "T00:00:00");
  const sunday = new Date(d);
  sunday.setDate(d.getDate() - d.getDay());
  const days = [];
  for(let i = 0; i < 7; i++){
    const day = new Date(sunday);
    day.setDate(sunday.getDate() + i);
    days.push(day.toISOString().slice(0,10));
  }
  return days;
}

function formatFullDate(dateStr){
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
}

const MEAL_COLORS = { Breakfast: "var(--meal-breakfast)", Lunch: "var(--meal-lunch)", Dinner: "var(--meal-dinner)", Snacks: "var(--meal-snack)" };

function renderDietChartView(){
  document.getElementById("tabBrowse").classList.remove("active");
  document.getElementById("tabDiary").classList.add("active");

  const dateStr = state.view.date;
  const dayEntries = dietChartEntries.filter(e => e.date === dateStr);
  const isEaten = e => e.eaten !== false;

  const eatenTotals = dayEntries.filter(isEaten).reduce((t, e) => ({
    calories: t.calories + e.calories, protein: t.protein + e.protein,
    carbs: t.carbs + e.carbs, fat: t.fat + e.fat
  }), { calories: 0, protein: 0, carbs: 0, fat: 0 });

  const mealEatenKcal = {};
  MEAL_TYPES.forEach(m => {
    mealEatenKcal[m] = dayEntries.filter(e => e.meal === m && isEaten(e)).reduce((s, e) => s + e.calories, 0);
  });

  const isToday = dateStr === todayStr();
  const weekDays = weekDatesFor(dateStr);
  const remaining = Math.round(dailyGoals.calories - eatenTotals.calories);

  const container = document.createElement("div");
  container.className = "content";
  container.innerHTML = `
    <div class="date-strip-row">
      <button class="icon-btn" onclick="changeChartWeek(-1)">‹</button>
      <div class="date-strip">
        ${weekDays.map((d, i) => `
          <button class="date-box ${d === dateStr ? "active" : ""}" onclick="setChartDate('${d}')">
            <span class="db-day">${DAY_ABBR[i]}</span>
            <span class="db-num">${Number(d.slice(8,10))}</span>
          </button>`).join("")}
      </div>
      <button class="icon-btn" onclick="changeChartWeek(1)">›</button>
    </div>

    ${isToday ? `<div class="diary-eyebrow">TODAY</div>` : ""}
    <h1 class="diary-date-heading">${formatFullDate(dateStr)}</h1>

    <div class="macro-summary-card">
      <div class="kcal-remaining-block">
        <div class="kcal-remaining-num">${remaining}</div>
        <div class="kcal-remaining-label">KCAL REMAINING</div>
        <div class="kcal-remaining-sub">${r(eatenTotals.calories)} eaten · ${dailyGoals.calories} goal</div>
        <div class="meal-stack-track">
          ${MEAL_TYPES.map(m => `<div class="meal-stack-fill" style="width:${Math.min(mealEatenKcal[m]/dailyGoals.calories*100,100)}%; background:${MEAL_COLORS[m]};"></div>`).join("")}
        </div>
        <div class="meal-legend">
          ${MEAL_TYPES.map(m => `
            <div class="meal-legend-row">
              <span class="meal-dot" style="background:${MEAL_COLORS[m]}"></span>
              <span>${m}</span>
              <span class="meal-legend-kcal">${r(mealEatenKcal[m])}</span>
            </div>`).join("")}
        </div>
      </div>
      <div class="macro-bars">
        <div class="macro-bar-row">
          <div class="macro-bar-head"><span>Protein</span><span>${r(eatenTotals.protein)} / ${dailyGoals.protein}g</span></div>
          <div class="macro-bar-track"><div class="macro-bar-fill p" style="width:${Math.min(eatenTotals.protein/dailyGoals.protein*100,100)}%"></div></div>
        </div>
        <div class="macro-bar-row">
          <div class="macro-bar-head"><span>Carbs</span><span>${r(eatenTotals.carbs)} / ${dailyGoals.carbs}g</span></div>
          <div class="macro-bar-track"><div class="macro-bar-fill c" style="width:${Math.min(eatenTotals.carbs/dailyGoals.carbs*100,100)}%"></div></div>
        </div>
        <div class="macro-bar-row">
          <div class="macro-bar-head"><span>Fat</span><span>${r(eatenTotals.fat)} / ${dailyGoals.fat}g</span></div>
          <div class="macro-bar-track"><div class="macro-bar-fill f" style="width:${Math.min(eatenTotals.fat/dailyGoals.fat*100,100)}%"></div></div>
        </div>
        <button class="btn text" style="padding-left:0; margin-top:6px;" onclick="openEditGoalsModal()">Edit daily goals</button>
      </div>
    </div>

    ${MEAL_TYPES.map(meal => renderMealSection(meal, dayEntries.filter(e => e.meal === meal))).join("")}
  `;
  document.getElementById("app").innerHTML = "";
  document.getElementById("app").appendChild(container);
}

function renderMealSection(meal, entries){
  const subtotal = entries.reduce((t, e) => t + e.calories, 0);
  return `
    <div class="section-block">
      <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;">
        <h2 style="margin:0; font-size:17px; text-transform:none; letter-spacing:normal; color:var(--ink);">${meal}</h2>
        <span style="font-size:13px; color:var(--ink-soft);">${r(subtotal)} kcal</span>
      </div>
      ${entries.length ? entries.map(e => { const eaten = e.eaten !== false; return `
        <div class="diary-entry-row">
          <div class="diary-entry-left">
            <input type="checkbox" class="entry-checkbox" ${eaten ? "checked" : ""} onchange="toggleEntryEaten('${e.id}')">
            <div>
              <div class="diary-entry-name">${e.icon || "🍽️"} ${e.recipeName}</div>
              <div class="diary-entry-sub">1 serving(s) · ${eaten ? "Eaten" : "Planned"}</div>
            </div>
          </div>
          <div class="diary-entry-right">
            <span class="diary-entry-kcal">${r(e.calories)} kcal</span>
            <button class="icon-x" onclick="removeDietChartEntry('${e.id}')">✕</button>
          </div>
        </div>`; }).join("") : `<p style="color:var(--ink-soft); font-size:13.5px; margin: 0;">Nothing added yet — find a recipe and tap "+ Add to chart."</p>`}
    </div>`;
}

function openEditGoalsModal(){
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.id = "goalsOverlay";
  overlay.innerHTML = `
    <div class="modal">
      <h2>Daily goals</h2>
      <div class="field"><label>Calories</label><input type="number" id="goalCal" value="${dailyGoals.calories}"></div>
      <div class="field"><label>Protein (g)</label><input type="number" id="goalProtein" value="${dailyGoals.protein}"></div>
      <div class="field"><label>Carbs (g)</label><input type="number" id="goalCarbs" value="${dailyGoals.carbs}"></div>
      <div class="field"><label>Fat (g)</label><input type="number" id="goalFat" value="${dailyGoals.fat}"></div>
      <div class="modal-actions">
        <button class="btn text" onclick="closeModal('goalsOverlay')">Cancel</button>
        <button class="btn primary" onclick="saveGoalsFromModal()">Save</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function saveGoalsFromModal(){
  dailyGoals = {
    calories: Number(document.getElementById("goalCal").value) || 2000,
    protein: Number(document.getElementById("goalProtein").value) || 140,
    carbs: Number(document.getElementById("goalCarbs").value) || 250,
    fat: Number(document.getElementById("goalFat").value) || 70
  };
  saveGoals(dailyGoals);
  closeModal("goalsOverlay");
  renderDietChartView();
}

/* ============ MASTER RENDER ============ */
function render(){
  if(state.view.name === "grid") renderGridView();
  else if(state.view.name === "detail") renderDetailView(state.view.id);
  else if(state.view.name === "dietchart") renderDietChartView();
}

init();

if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch((e) => console.warn("Service worker failed to register:", e));
  });
}
</script>
</body>
</html>
