<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriRecipes</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1D9E75">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg: #F7F7F5;
    --accent: #1D9E75;
    --accent-dark: #167A5B;
    --card: #FFFFFF;
    --border: #EAEAE6;
    --ink: #222222;
    --ink-soft: #8A8A85;
    --protein-bg: #E8F0FE; --protein-fg: #2B5FBF;
    --carb-bg: #FCEFE0; --carb-fg: #B5690E;
    --fat-bg: #FBEAEA; --fat-fg: #B23A3A;
    --radius: 16px;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  a{ color: inherit; }
  button{ font-family: inherit; }

  /* ===== Loading screen ===== */
  #loadingScreen{
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100;
    gap: 14px;
  }
  .spinner{
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  #loadingScreen .msg{ color: var(--ink-soft); font-size: 14px; }

  /* ===== Header ===== */
  .header{
    max-width: 1180px;
    margin: 0 auto;
    padding: 24px 24px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .brand{
    font-size: 26px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-actions{
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    justify-content: flex-end;
    min-width: 260px;
  }
  .search-box{
    flex: 1;
    max-width: 360px;
    position: relative;
  }
  .search-box input{
    width: 100%;
    padding: 11px 16px 11px 38px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--card);
    font-size: 14px;
    outline: none;
  }
  .search-box input:focus{ border-color: var(--accent); }
  .search-box .icon{
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--ink-soft); font-size: 14px; pointer-events:none;
  }
  .icon-btn{
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    display: flex; align-items:center; justify-content:center;
    cursor: pointer;
    font-size: 16px;
    color: var(--ink-soft);
    flex-shrink: 0;
  }
  .icon-btn:hover{ border-color: var(--accent); color: var(--accent); }

  /* ===== Data source banners ===== */
  .data-banner{
    max-width: 1180px;
    margin: 16px auto 0;
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 13.5px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .data-banner.warn{ background: #FFF6E5; color: #8A5A00; border: 1px solid #F0DBA0; }
  .data-banner.error{ background: #FBEAEA; color: #B23A3A; border: 1px solid #F0BABA; }
  .data-banner button{
    border: 1px solid currentColor;
    background: none;
    color: inherit;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
  }

  /* ===== Filters ===== */
  .filters-panel{
    max-width: 1180px;
    margin: 20px auto 0;
    padding: 20px 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .filters-panel + .filters-panel{ margin-top: 0; }
  .filter-label{
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .chip-row{
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 18px;
  }
  .chip-row:last-child{ margin-bottom: 0; }
  .chip{
    padding: 8px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    color: var(--ink);
    user-select: none;
  }
  .chip:hover{ border-color: var(--accent); }
  .chip.active{
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ===== Content wrap ===== */
  .content{
    max-width: 1180px;
    margin: 0 auto;
    padding: 20px 24px 120px;
  }
  .result-count{
    font-size: 14px;
    color: var(--ink-soft);
    margin: 4px 0 16px;
  }
  .result-count b{ color: var(--ink); }

  /* ===== Recipe grid ===== */
  .grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }
  .card{
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 18px 20px;
    text-align: center;
    cursor: pointer;
    transition: box-shadow 0.15s ease, transform 0.15s ease;
  }
  .card:hover{
    box-shadow: 0 10px 24px -14px rgba(0,0,0,0.25);
    transform: translateY(-2px);
  }
  .card-icon{
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--bg);
    font-size: 30px;
    display: flex; align-items:center; justify-content:center;
    margin: 0 auto 12px;
    overflow: hidden;
  }
  .card-thumb-img{
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .card-title{
    font-size: 16px;
    font-weight: 700;
    margin: 0 0 10px;
    line-height: 1.3;
  }
  .cal-pill{
    display: inline-block;
    background: #FCEFE0;
    color: #B5690E;
    font-size: 12.5px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 999px;
    margin-bottom: 10px;
  }
  .macro-badges{
    display: flex;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .badge{
    font-size: 11.5px;
    font-weight: 700;
    padding: 4px 9px;
    border-radius: 999px;
  }
  .badge.p{ background: var(--protein-bg); color: var(--protein-fg); }
  .badge.c{ background: var(--carb-bg); color: var(--carb-fg); }
  .badge.f{ background: var(--fat-bg); color: var(--fat-fg); }

  .empty-state{
    grid-column: 1 / -1;
    text-align: center;
    padding: 70px 20px;
    color: var(--ink-soft);
  }
  .empty-state h3{ color: var(--ink); font-size: 19px; margin: 0 0 6px; }
  .empty-state button{
    margin-top: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 999px;
    font-weight: 600;
    cursor: pointer;
  }

  /* ===== FAB ===== */
  .fab{
    position: fixed;
    right: 28px; bottom: 28px;
    width: 58px; height: 58px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none;
    font-size: 28px;
    line-height: 1;
    box-shadow: 0 8px 20px -6px rgba(29,158,117,0.6);
    cursor: pointer;
    z-index: 40;
  }
  .fab:hover{ background: var(--accent-dark); }

  /* ===== Detail view ===== */
  .back-btn{
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    padding: 8px 0 18px;
  }
  .back-btn:hover{ color: var(--accent); }
  .detail-hero{
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 34px 24px;
    text-align: center;
    margin-bottom: 20px;
  }
  .detail-hero .card-icon{ width: 84px; height: 84px; font-size: 40px; }
  .detail-hero h1{ font-size: 24px; margin: 4px 0 14px; }
  .detail-hero .cal-pill{ font-size: 14px; padding: 7px 16px; }
  .detail-hero .macro-badges{ margin-top: 12px; }
  .detail-hero .badge{ font-size: 13px; padding: 6px 12px; }

  .section-block{
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 20px;
  }
  .section-block h2{
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    margin: 0 0 14px;
  }

  .video-yt, .video-ig{
    display: block;
    text-decoration: none;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }
  .video-yt img{ width: 100%; display: block; }
  .video-yt .play{
    position: absolute; top:50%; left:50%; transform: translate(-50%,-50%);
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(0,0,0,0.65);
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size: 22px;
  }
  .video-ig{
    background: #111;
    color: #fff;
    padding: 28px;
    text-align: center;
    font-weight: 600;
  }
  .video-ig .ig-badge{
    display:inline-block; margin-bottom:8px; font-size: 26px;
  }
  .no-video{ color: var(--ink-soft); font-size: 14px; }

  .ingredient-row{
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .ingredient-row:last-child{ border-bottom: none; }
  .ingredient-row .name{ font-weight: 600; text-transform: capitalize; }
  .ingredient-row .macro-mini{ color: var(--ink-soft); font-size: 12.5px; }
  .ingredient-row.unmatched .name{ color: #B23A3A; }
  .ingredient-row.unmatched .macro-mini::after{ content: " (not found in food database)"; }

  .ingredient-row-editable{
    display: grid;
    grid-template-columns: 64px auto 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .ingredient-row-editable:last-child{ border-bottom: none; }
  .ingredient-row-editable.unmatched{ color: #B23A3A; }
  .ing-qty-input{
    width: 100%; padding: 7px 8px; border-radius: 8px; border: 1px solid var(--border);
    font-size: 13.5px; font-weight: 600; text-align: right;
  }
  .ing-qty-input:focus{ outline: 2px solid var(--accent); border-color: var(--accent); }
  .ing-unit{ font-size: 11px; color: var(--ink-soft); }
  .ing-name-input{
    padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border);
    font-size: 13.5px; font-weight: 600; text-transform: capitalize; background: var(--bg);
    width: 100%;
  }
  .ing-name-input:focus{ outline: 2px solid var(--accent); border-color: var(--accent); }

  .steps-list{ margin: 0; padding-left: 20px; }
  .steps-list li{ margin-bottom: 12px; line-height: 1.5; font-size: 14.5px; }
  .steps-list li:last-child{ margin-bottom: 0; }

  /* ===== Modal (Add Recipe / Settings) ===== */
  .modal-overlay{
    position: fixed; inset: 0;
    background: rgba(20,20,18,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 60;
    padding: 20px;
  }
  .modal{
    background: var(--card);
    border-radius: var(--radius);
    width: 100%;
    max-width: 520px;
    max-height: 88vh;
    overflow-y: auto;
    padding: 26px;
  }
  .modal h2{ margin: 0 0 18px; font-size: 19px; }
  .field{ margin-bottom: 16px; }
  .field label{
    display: block;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--ink-soft);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .field input, .field textarea{
    width: 100%;
    padding: 10px 13px;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    resize: vertical;
  }
  .field input:focus, .field textarea:focus{ border-color: var(--accent); }
  .field .hint{ font-size: 12px; color: var(--ink-soft); margin-top: 5px; }
  .live-macro-box{
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 16px;
    font-size: 13.5px;
  }
  .live-macro-box .cal-line{ font-weight: 700; margin-bottom: 6px; }
  .live-macro-box .warn{ color: #B23A3A; font-size: 12.5px; margin-top: 6px; }
  .modal-actions{
    display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px;
  }
  .btn{
    padding: 10px 20px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--ink);
  }
  .btn.primary{
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn.primary:hover{ background: var(--accent-dark); }
  .btn.text{ border: none; background: none; color: var(--ink-soft); }

  @media (max-width: 640px){
    .header{ padding: 18px 16px 0; }
    .content{ padding: 16px 16px 120px; }
    .filters-panel{ margin: 16px 16px 0; padding: 16px; }
  }
</style>
</head>
<body>

<div id="loadingScreen">
  <div class="spinner"></div>
  <div class="msg" id="loadingMsg">Loading recipes…</div>
</div>

<div class="header">
  <div class="brand">🥦 NutriRecipes</div>

  </div>
</div>

<div id="app"></div>

/* Aliases: friendly ingredient names -> exact food_item in the database */
const ALIASES = {
  "fruits": "apple/guava/pineapple/watermelon/grapes",
  "fruit": "apple/guava/pineapple/watermelon/grapes",
  "greek yogurt": "chobani plain non fat greek yogurt",
  "yogurt": "chobani plain non fat greek yogurt",
  "protein bar": "protein bar kirkland",
  "oats": "quaker old fashioned oats",
  "nuts": "almonds/cashew/walnuts",
  "dal": "toor dal",
  "flour": "wheat flour"
};

const BUCKET_SIZE = 100, BUCKET_COUNT = 10;
const UNITS = ["g","kg","ml","l","cup","cups","tbsp","tsp","piece","pieces","pc","pcs"];

/* ============ MACRO ENGINE ============ */
function parseIngredientLine(line){
  const tokens = line.trim().split(/\s+/);
  if(tokens.length < 2) return null;
  const qty = parseFloat(tokens[0]);
  if(isNaN(qty)) return null;
  let name;
  if(UNITS.includes(tokens[1].toLowerCase())){
    name = tokens.slice(2).join(" ");
  } else {
    name = tokens.slice(1).join(" ");
  }
  return { qty, name: name.trim().toLowerCase(), raw: line.trim() };
}

function findFood(name){
  if(ALIASES[name]){
    const f = foodDB.find(f => f.food_item === ALIASES[name]);
    if(f) return f;
  }
  let exact = foodDB.find(f => f.food_item === name);
  if(exact) return exact;
  // Combined-option names like "rice/wheat flour/quinoa/semiya" — match if the
  // ingredient name equals the FIRST listed option. This is checked before the
  // loose substring fallback so it can't be shadowed by an unrelated item
  // (e.g. "rice flour") that also happens to contain the same substring.
  let firstOptionMatch = foodDB.find(f => f.food_item.split("/")[0].trim() === name);
  if(firstOptionMatch) return firstOptionMatch;
  let partial = foodDB.find(f => f.food_item.includes(name) || name.includes(f.food_item));
  if(partial) return partial;
  return null;
}

function calcMacros(ingredientsStr, overrides){
  overrides = overrides || {};
  const lines = (ingredientsStr || "").split("|").map(s => s.trim()).filter(Boolean);
  const totals = { calories: 0, fat: 0, carbs: 0, protein: 0 };
  const details = [];
  lines.forEach((line, idx) => {
    const parsed = parseIngredientLine(line);
    if(!parsed){ details.push({ raw: line, matched: false, idx }); return; }
    const ov = overrides[idx] || {};
    const qty = (ov.qty !== undefined && ov.qty !== null && ov.qty !== "") ? Number(ov.qty) : parsed.qty;
    const name = ov.name || parsed.name;
    const food = findFood(name);
    if(!food){ details.push({ ...parsed, qty, name, matched: false, idx }); return; }
    const scale = qty / food.quantity;
    const m = { calories: food.calories*scale, fat: food.fat*scale, carbs: food.carbs*scale, protein: food.protein*scale };
    totals.calories += m.calories; totals.fat += m.fat; totals.carbs += m.carbs; totals.protein += m.protein;
    details.push({ ...parsed, qty, name, matched: true, macros: m, dbItem: food.food_item, idx });
  });
  return { totals, details };
}

  try{

    if(loaded.recipes.length){
      localStorage.setItem("nr_cache", JSON.stringify({ ...loaded, ts: Date.now() }));
      dataSource = "live";
    } else {
      loaded = null;
    }
  }catch(e){
    console.warn("Supabase fetch failed:", e);
    loaded = null;
  }

  if(!loaded){
    const cached = localStorage.getItem("nr_cache");
    if(cached){
      try{
        loaded = JSON.parse(cached);
        dataSource = "cache";
      }catch(e){ loaded = null; }
    }
  }

  if(!loaded || !loaded.recipes || !loaded.recipes.length){
    // Genuinely nothing to show — do NOT silently substitute unrelated demo content.
    recipes = [];
    foodDB = FOOD_DB_DEFAULT;
    dataSource = "unavailable";
    showLoading(false);
    render();
    return;
  }

  recipes = loaded.recipes;
  foodDB = (loaded.foodDB && loaded.foodDB.length) ? loaded.foodDB : FOOD_DB_DEFAULT;
  showLoading(false);
  render();
}

/* ============ FILTER HELPERS ============ */
function bucketIndex(cal){ return Math.min(Math.floor(cal / BUCKET_SIZE), BUCKET_COUNT - 1); }

function bucketLabel(i){
  const lo = i * BUCKET_SIZE, hi = (i+1) * BUCKET_SIZE;
  return i === BUCKET_COUNT - 1 ? `${lo}+` : `${lo}–${hi}`;
}

function allIngredientTags(){
  const set = new Set();
  recipes.forEach(rc => {
    recipeIngredientLabels(rc).forEach(label => set.add(label));
  });
  return [...set].sort();
}

function recipeIngredientLabels(rc){
  const labels = new Set();
  (rc.ingredients || "").split("|").map(s => s.trim()).filter(Boolean).forEach(line => {
    const parsed = parseIngredientLine(line);
    if(!parsed) return;
    const food = findFood(parsed.name);
    const label = food ? food.food_item : parsed.name;
    const shortLabel = label.split("/")[0].split("(")[0].trim();
    if(shortLabel) labels.add(shortLabel);
  });
  return labels;
}

function matchesSearch(rc, term){
  if(!term) return true;
  const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const re = new RegExp("\\b" + escaped, "i");
  if(re.test(rc.name)) return true;
  return [...recipeIngredientLabels(rc)].some(label => re.test(label));
}

function passesFilters(rc){
  const totals = calcMacros(rc.ingredients).totals;
  const bucketOk = state.buckets.size === 0 || state.buckets.has(bucketIndex(totals.calories));
  const tagOk = state.tags.size === 0 || [...recipeIngredientLabels(rc)].some(label => state.tags.has(label));
  const searchOk = matchesSearch(rc, state.search);
  return bucketOk && tagOk && searchOk;
}

function renderGridView(){
  const container = document.createElement("div");

  if(dataSource === "cache"){
    const banner = document.createElement("div");
    banner.className = "data-banner warn";
    banner.innerHTML = `⚠️ Couldn't reach the live database just now — showing the last data saved on this device. <button onclick="refreshData()">Retry</button>`;
    container.appendChild(banner);
  } else if(dataSource === "unavailable"){
    const banner = document.createElement("div");
    banner.className = "data-banner error";
    banner.innerHTML = `🔌 Couldn't load recipes right now. Check your connection and try again. <button onclick="refreshData()">Retry</button>`;
    container.appendChild(banner);
  }

  const filterPanel = document.createElement("div");
  filterPanel.className = "filters-panel";
  filterPanel.innerHTML = `
    <div class="filter-label">🔥 Calories per serving</div>
    <div class="chip-row" id="bucketChips"></div>
    <div class="filter-label">🥘 Main ingredient</div>
    <div class="chip-row" id="tagChips"></div>
  `;
  container.appendChild(filterPanel);

  const content = document.createElement("div");
  content.className = "content";
  const filtered = recipes.filter(passesFilters);
  content.innerHTML = `<div class="result-count">Showing <b>${filtered.length}</b> of ${recipes.length} recipes</div>
    <div class="grid" id="recipeGrid"></div>`;
  container.appendChild(content);

  document.getElementById("app").innerHTML = "";
  document.getElementById("app").appendChild(container);

  const bucketChips = document.getElementById("bucketChips");
  for(let i = 0; i < BUCKET_COUNT; i++){
    const chip = document.createElement("div");
    chip.className = "chip" + (state.buckets.has(i) ? " active" : "");
    chip.textContent = bucketLabel(i);
    chip.onclick = () => { state.buckets.has(i) ? state.buckets.delete(i) : state.buckets.add(i); render(); };
    bucketChips.appendChild(chip);
  }

  const tagChips = document.getElementById("tagChips");
  allIngredientTags().forEach(tag => {
    const chip = document.createElement("div");
    chip.className = "chip" + (state.tags.has(tag) ? " active" : "");
    chip.textContent = tag.charAt(0).toUpperCase() + tag.slice(1);
    chip.onclick = () => { state.tags.has(tag) ? state.tags.delete(tag) : state.tags.add(tag); render(); };
    tagChips.appendChild(chip);
  });

  const grid = document.getElementById("recipeGrid");
  if(filtered.length === 0){
    if(recipes.length === 0){
      grid.innerHTML = `<div class="empty-state">
        <h3>No recipes to show right now</h3>
        <p>${dataSource === "unavailable" ? "We couldn't reach the recipe database." : "Nothing here yet."}</p>
        <button onclick="refreshData()">Retry</button>
      </div>`;
    } else {
      grid.innerHTML = `<div class="empty-state">
        <h3>No recipes match those filters</h3>
        <p>Try clearing a filter or your search.</p>
        <button onclick="clearAllFilters()">Clear filters</button>
      </div>`;
    }
    return;
  }
  filtered.forEach(rc => {
    const totals = calcMacros(rc.ingredients).totals;
    const card = document.createElement("div");
    card.className = "card";
    card.onclick = () => { state.view = { name: "detail", id: rc.id, overrides: {} }; render(); };
    card.innerHTML = `
      <div class="card-icon">${cardThumb(rc)}</div>
      <div class="card-title">${rc.name}</div>
      <div class="cal-pill">${r(totals.calories)} kcal</div>
      <div class="macro-badges">
        <span class="badge p">P ${r(totals.protein)}g</span>
        <span class="badge c">C ${r(totals.carbs)}g</span>
        <span class="badge f">F ${r(totals.fat)}g</span>
      </div>`;
    grid.appendChild(card);
  });
}

  if(!url) return null;
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{6,})/);
  return m ? m[1] : null;
}

function cardThumb(rc){
  if(rc.thumbnail_url) return `<img class="card-thumb-img" src="${rc.thumbnail_url}" alt="">`;
  const ytId = youtubeId(rc.video_url);
  if(ytId) return `<img class="card-thumb-img" src="https://img.youtube.com/vi/${ytId}/hqdefault.jpg" alt="">`;
  return rc.icon || "🍽️";
}

      <div class="macro-badges" id="heroMacroBadges">
        <span class="badge p">Protein ${r(totals.protein)}g</span>
        <span class="badge c">Carbs ${r(totals.carbs)}g</span>
        <span class="badge f">Fat ${r(totals.fat)}g</span>
      </div>
    </div>
    <div class="section-block">
      <h2>Video</h2>
      ${renderVideoBlock(rc.video_url)}
    </div>
    <div class="section-block">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
        <h2 style="margin:0;">Ingredients — adjust to fit your portion</h2>
        ${hasOverrides ? `<button class="btn small" onclick="resetIngredientOverrides()">↺ Reset to original</button>` : ""}
      </div>
      <div id="ingredientRows">
        <datalist id="foodOptionsDatalist">
          ${foodDB.map(f => `<option value="${f.food_item}">`).join("")}
        </datalist>
        ${details.map(d => renderIngredientRow(d)).join("") || "<p>No ingredients listed.</p>"}
      </div>
    </div>
    <div class="section-block">
      <h2>Steps</h2>
      ${steps.length ? `<ol class="steps-list">${steps.map(s => `<li>${s}</li>`).join("")}</ol>` : "<p>No steps listed.</p>"}
    </div>
  `;
  document.getElementById("app").innerHTML = "";
  document.getElementById("app").appendChild(container);
}

function renderIngredientRow(d){
  const displayName = (d.dbItem || d.name || "").split("/")[0].split("(")[0].trim();
  return `
    <div class="ingredient-row-editable ${d.matched ? "" : "unmatched"}">
      <input type="number" class="ing-qty-input" value="${d.qty}" min="0" step="1"
        onchange="updateIngredientQty(${d.idx}, this.value)">
      <span class="ing-unit">g/ml/pc</span>
      <input type="text" class="ing-name-input" list="foodOptionsDatalist" value="${displayName}"
        placeholder="type to swap, e.g. 'pan' for paneer options"
        onchange="updateIngredientFood(${d.idx}, this.value)">
      <span class="macro-mini">${d.matched ? r(d.macros.calories) + " kcal" : "not found"}</span>
    </div>`;
}

function updateIngredientQty(idx, val){
  if(!state.view.overrides) state.view.overrides = {};
  if(!state.view.overrides[idx]) state.view.overrides[idx] = {};
  state.view.overrides[idx].qty = val;
  renderDetailView(state.view.id);
}

function updateIngredientFood(idx, val){
  if(!state.view.overrides) state.view.overrides = {};
  if(!state.view.overrides[idx]) state.view.overrides[idx] = {};
  const cleaned = (val || "").trim().toLowerCase();
  if(cleaned) state.view.overrides[idx].name = cleaned;
  else delete state.view.overrides[idx].name;
  renderDetailView(state.view.id);
}

function resetIngredientOverrides(){
  state.view.overrides = {};
  renderDetailView(state.view.id);
}

function goHome(){ state.view = { name: "grid" }; render(); }

/* ============ ADMIN ADD/EDIT (deferred — managed via Supabase Table Editor for now) ============ */

/* ============ MASTER RENDER ============ */
function render(){
  if(state.view.name === "grid") renderGridView();
  else if(state.view.name === "detail") renderDetailView(state.view.id);
}

init();

if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch((e) => console.warn("Service worker failed to register:", e));
  });
}
</script>
</body>
</html>
